<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Janedore · Coming Soon</title>

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://www.google.com https://recaptcha.google.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://*.firebaseapp.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://firebaseappcheck.googleapis.com https://www.google.com; frame-src 'self' https://www.google.com https://recaptcha.google.com;">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.google.com/recaptcha/api.js?render=6LflSL0sAAAAALW3QE_97nluvPjgNv0TIsYPhGwx"></script>

<style>
/* (UNCHANGED — your full styling preserved) */

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Manrope', sans-serif;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
}

.coming-soon-container {
  width: 100%;
  max-width: 520px;
  text-align: center;
}

.logo { width: 180px; filter: brightness(0) invert(1); }

.signup-form { width: 100%; }

.input-wrapper { position: relative; width: 100%; }

.email-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  padding: 16px 48px 16px 0;
  color: #fff;
  outline: none;
}

.submit-btn {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #aaa;
  cursor: pointer;
}

.form-message {
  font-size: 12px;
  min-height: 20px;
  color: #fff;
  margin-top: 10px;
}

.success { color: #4ade80; }
.error { color: #f87171; }

.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>

<body>

<main class="coming-soon-container">

  <img class="logo" src="https://cdn.shopify.com/s/files/1/0705/5615/6145/files/janedore-logo.png?v=1776021202">

  <form id="signup-form">

    <div class="input-wrapper">
      <input id="email-input" type="email" placeholder="Enter your email" class="email-input" required>
      <button class="submit-btn" type="submit">→</button>
    </div>

    <div id="form-message" class="form-message"></div>

  </form>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { initializeAppCheck, ReCaptchaV3Provider } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";

const SITE_KEY = "6LflSL0sAAAAALW3QE_97nluvPjgNv0TIsYPhGwx";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyBjtD9j-jKHtjMVmI2ENxy0T3ts9uf2JNI",
  authDomain: "janedore-9f035.firebaseapp.com",
  projectId: "janedore-9f035",
});

initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider(SITE_KEY),
  isTokenAutoRefreshEnabled: true
});

const db = getFirestore(app);

/* UI */
const form = document.getElementById("signup-form");
const email = document.getElementById("email-input");
const msg = document.getElementById("form-message");

function show(text, type="") {
  msg.textContent = text;
  msg.className = "form-message " + type;
}

/* VALIDATION */
function validEmail(v){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}

/* FIXED RECAPTCHA (NO SILENT FAILS) */
async function getToken() {
  return new Promise((resolve, reject) => {
    if (typeof grecaptcha === "undefined") {
      return reject("reCAPTCHA not loaded");
    }

    grecaptcha.ready(async () => {
      try {
        const token = await grecaptcha.execute(SITE_KEY, {
          action: "newsletter_signup"
        });

        if (!token) return reject("Empty token");

        resolve(token);

      } catch (e) {
        reject(e.message);
      }
    });
  });
}

/* SUBMIT */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const value = email.value.trim();

  if (!value) return show("Enter email", "error");
  if (!validEmail(value)) return show("Invalid email", "error");

  show("Submitting...");

  try {

    let token;

    try {
      token = await getToken();
    } catch (err) {
      show("Security check failed. Refresh page.", "error");
      return; // IMPORTANT: stop submission
    }

    await addDoc(collection(db, "newsletter_subscribers"), {
      email: value,
      recaptcha: token,
      created: serverTimestamp()
    });

    show("You're on the list 💎", "success");
    email.value = "";

  } catch (err) {
    show("Error saving email", "error");
    console.log(err);
  }
});

</script>

</body>
</html>
