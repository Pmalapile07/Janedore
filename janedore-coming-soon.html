<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<!-- Security Headers -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://www.gstatic.com https://www.google.com https://recaptcha.google.com https://www.gstatic.cn https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://*.firebaseapp.com https://*.firebaseio.com wss://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://firebaseappcheck.googleapis.com https://www.google.com; frame-src 'self' https://www.google.com https://recaptcha.google.com;">

<!-- reCAPTCHA v3: async+defer prevents blocking page parse and reduces timing races -->
<script src="https://www.google.com/recaptcha/api.js?render=6LeZz7wsAAAAALxA7WIpLOCP3gxJaQwEIDxLmSmf" async defer></script>

<style>
  /* Debug panel */
  #debug-console {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.8);
    color: #0f0;
    font-family: monospace;
    font-size: 11px;
    padding: 10px;
    border-radius: 5px;
    max-width: 300px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 9999;
    border: 1px solid #0f0;
    display: none;
  }

  #debug-console.show { display: block; }
  .debug-log   { margin: 2px 0; border-bottom: 1px solid #333; }
  .debug-error   { color: #f00; }
  .debug-success { color: #0f0; }
  .debug-warn    { color: #ff0; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    background: #000000;
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
    height: 100vh;
    margin: 0;
    overscroll-behavior: none;
  }

  .store-owner-link {
    position: fixed;
    top: 28px;
    right: 28px;
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.4);
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: color 0.2s;
    z-index: 10;
    background: transparent;
    padding: 6px 0;
  }

  .store-owner-link:hover {
    color: rgba(255, 255, 255, 0.75);
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  .store-owner-link:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 4px;
  }

  .coming-soon-container {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: fadeIn 1.2s ease-out;
    height: auto;
    max-height: 100vh;
    overflow-y: auto;
    padding: 40px 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .coming-soon-container::-webkit-scrollbar { display: none; }

  @keyframes fadeIn {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .logo-wrapper { margin-top: 24px; margin-bottom: 40px; }

  .logo {
    width: 100%;
    max-width: 180px;
    height: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin: 0 auto;
  }

  .signup-form { width: 100%; margin-bottom: 24px; }

  .input-wrapper { position: relative; width: 100%; margin-bottom: 8px; }

  .email-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    padding: 16px 48px 16px 0;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #ffffff;
    outline: none;
    transition: border-color 0.3s ease;
    -webkit-appearance: none;
  }

  .email-input::placeholder { color: rgba(255, 255, 255, 0.4); font-weight: 300; }
  .email-input:focus { border-bottom-color: #ffffff; }

  .submit-btn {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 8px;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .submit-btn:hover { color: #ffffff; }
  .submit-btn:focus-visible { outline: 2px solid #ffffff; outline-offset: 2px; }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .submit-btn i { font-size: 24px; }
  .btn-text { display: none; }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .form-message {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 400;
    min-height: 32px;
    padding: 8px 0;
    text-align: left;
    display: none;
  }

  .form-message.show   { display: block; }
  .form-message.success { color: #4ade80; }
  .form-message.error   { color: #f87171; }
  .form-message.info    { color: rgba(255, 255, 255, 0.6); }

  .legal-text {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.35);
    line-height: 1.6;
    margin-top: 12px;
    max-width: 400px;
    text-align: left;
  }

  .legal-text a {
    color: rgba(255, 255, 255, 0.5);
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.2s;
  }

  .legal-text a:hover { color: rgba(255, 255, 255, 0.8); }

  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: #ffffff;
    color: #000000;
    padding: 8px 16px;
    z-index: 10000;
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
  }

  .skip-link:focus { top: 0; }

  .recaptcha-notice {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.25);
    margin-top: 8px;
    text-align: left;
  }

  .recaptcha-notice a { color: rgba(255, 255, 255, 0.4); text-decoration: underline; }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }
</style>
</head>
<body>

<div id="debug-console"></div>

<a href="admin.html" class="store-owner-link" aria-label="Store owner login">Are you the store owner? Login.</a>
<a href="#main-content" class="skip-link">Skip to main content</a>

<main id="main-content" class="coming-soon-container">

  <div class="logo-wrapper">
    <img class="logo"
         src="https://cdn.shopify.com/s/files/1/0705/5615/6145/files/janedore-logo.png?v=1776021202"
         alt="Janedore">
  </div>

  <form class="signup-form" id="signup-form" onsubmit="return false;">
    <!-- Honeypot: hidden from real users, filled by bots -->
    <input type="text" name="website" id="website-field"
           style="display:none" tabindex="-1" autocomplete="off" aria-hidden="true">

    <div class="input-wrapper">
      <label for="email-input" class="sr-only">Email address</label>
      <input type="email"
             class="email-input"
             id="email-input"
             placeholder="Enter your email"
             aria-label="Email address for launch notification"
             autocomplete="email"
             required>
      <button type="submit" class="submit-btn" id="submit-btn" aria-label="Subscribe">
        <span id="btn-text" class="btn-text">Notify Me</span>
        <i class="ph ph-arrow-right" id="arrow-icon" aria-hidden="true"></i>
        <span id="btn-spinner" class="spinner" style="display:none;"></span>
      </button>
    </div>

    <div class="form-message" id="form-message" role="status" aria-live="polite"></div>

    <p class="legal-text">
      Be the first to know when we launch. By signing up, you agree to receive
      emails from Janedore. We respect your privacy —
      <a href="unsubscribe.html" aria-label="Unsubscribe from Janedore emails">unsubscribe anytime</a>.
    </p>

    <p class="recaptcha-notice">
      Protected by reCAPTCHA.
      <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy</a> &
      <a href="https://policies.google.com/terms" target="_blank" rel="noopener">Terms</a>
    </p>
  </form>

</main>

<script type="module">

  // ─── Single source of truth for the reCAPTCHA site key ───────────────────
  // Update this one constant if the key ever changes — it is used in every
  // place that needs it: App Check, grecaptcha.execute, and the script tag.
  const RECAPTCHA_SITE_KEY = '6LflSL0sAAAAALW3QE_97nluvPjgNv0TIsYPhGwx 
';

  // ============ DEBUG CONSOLE ============
  const debugConsole = document.getElementById('debug-console');
  debugConsole.classList.add('show');

  function debugLog(message, type = 'info') {
    const entry = document.createElement('div');
    entry.className = `debug-log debug-${type}`;
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    debugConsole.appendChild(entry);
    debugConsole.scrollTop = debugConsole.scrollHeight;
    console.log(`🔍 ${message}`);
  }

  function debugError(msg)   { debugLog(msg, 'error');   console.error(`❌ ${msg}`); }
  function debugSuccess(msg) { debugLog(msg, 'success'); console.log(`✅ ${msg}`);   }
  function debugWarn(msg)    { debugLog(msg, 'warn');    console.warn(`⚠️ ${msg}`);  }

  debugSuccess('Debug console initialized');

  // Poll until reCAPTCHA badge appears in the DOM (visual confirmation only)
  let recaptchaCheckCount = 0;
  const recaptchaChecker = setInterval(() => {
    recaptchaCheckCount++;
    if (typeof grecaptcha !== 'undefined' && typeof grecaptcha.execute === 'function') {
      debugSuccess('reCAPTCHA object + execute method confirmed ready');
      const badge = document.querySelector('.grecaptcha-badge');
      if (badge) {
        const s = window.getComputedStyle(badge);
        debugSuccess('reCAPTCHA badge present in DOM');
        debugLog(`Badge — visibility:${s.visibility} display:${s.display} opacity:${s.opacity}`);
      } else {
        debugWarn('reCAPTCHA badge not yet in DOM (may appear shortly)');
      }
      clearInterval(recaptchaChecker);
    } else if (recaptchaCheckCount > 20) {
      debugError('reCAPTCHA did not become ready within 10s — check site key and network');
      clearInterval(recaptchaChecker);
    }
  }, 500);
  // ============ END DEBUG CONSOLE ============

  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { initializeAppCheck, ReCaptchaV3Provider }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";

  debugLog('Firebase modules imported');

  const firebaseConfig = {
    apiKey:            "AIzaSyBjtD9j-jKHtjMVmI2ENxy0T3ts9uf2JNI",
    authDomain:        "janedore-9f035.firebaseapp.com",
    projectId:         "janedore-9f035",
    storageBucket:     "janedore-9f035.firebasestorage.app",
    messagingSenderId: "571299748651",
    appId:             "1:571299748651:web:01463a772d47b39cc4036e",
    measurementId:     "G-Y9NMT0ZGKZ"
  };

  debugLog('Initializing Firebase app…');
  const app = initializeApp(firebaseConfig);
  debugSuccess('Firebase app initialized');

  // App Check uses the same constant — no key duplication
  try {
    debugLog('Initializing App Check…');
    initializeAppCheck(app, {
      provider: new ReCaptchaV3Provider(RECAPTCHA_SITE_KEY),
      isTokenAutoRefreshEnabled: true
    });
    debugSuccess('App Check initialized');
  } catch (err) {
    debugError(`App Check init failed: ${err.message}`);
    debugWarn('Continuing without App Check');
  }

  const db = getFirestore(app);
  debugSuccess('Firestore initialized');

  // DOM refs
  const form          = document.getElementById('signup-form');
  const emailInput    = document.getElementById('email-input');
  const submitBtn     = document.getElementById('submit-btn');
  const btnSpinner    = document.getElementById('btn-spinner');
  const arrowIcon     = document.getElementById('arrow-icon');
  const formMessage   = document.getElementById('form-message');
  const honeypotField = document.getElementById('website-field');

  debugLog('DOM elements cached');

  const SecurityManager = {
    generateClientId() {
      let id = localStorage.getItem('janedore_secure_client');
      if (!id) {
        id = 'jd_' + Date.now() + '_' + Math.random().toString(36);
        localStorage.setItem('janedore_secure_client', id);
      }
      return id;
    }
  };

  class InputValidator {
    static validateEmail(email) {
      if (!email || typeof email !== 'string') return false;
      const t = email.trim().toLowerCase();
      if (t.length < 5 || t.length > 254) return false;
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t)) return false;
      const blocked = ['tempmail','throwaway','guerrillamail','mailinator','10minutemail','yopmail'];
      const domain  = t.split('@')[1];
      if (blocked.some(d => domain.includes(d))) return false;
      return true;
    }
    static sanitizeInput(input) {
      return input ? input.replace(/[<>]/g, '').trim() : '';
    }
  }

  function showMessage(text, type) {
    formMessage.textContent = text;
    formMessage.className   = `form-message show ${type}`;
    debugLog(`Message shown: ${text} (${type})`);
  }

  function clearMessage() {
    formMessage.className   = 'form-message';
    formMessage.textContent = '';
  }

  function setLoading(on) {
    submitBtn.disabled       = on;
    emailInput.disabled      = on;
    arrowIcon.style.display  = on ? 'none'         : 'block';
    btnSpinner.style.display = on ? 'inline-block' : 'none';
    debugLog(`Loading: ${on}`);
  }

  /**
   * getRecaptchaToken()
   *
   * Fix: grecaptcha.ready() can fire while the internal v3 execute method is
   * still undefined on slow connections — producing "Invalid site key or not
   * loaded" even though `typeof grecaptcha !== 'undefined'` is true.
   *
   * Solution: poll specifically for grecaptcha.execute (not just grecaptcha),
   * then enter grecaptcha.ready() only once execute is confirmed present.
   * A hard timeout surfaces a clear, actionable error instead of hanging.
   */
  function getRecaptchaToken() {
    debugLog('Requesting reCAPTCHA token…');

    const TIMEOUT_MS = 10000; // give up after 10 s
    const POLL_MS    = 100;   // check every 100 ms

    return new Promise((resolve, reject) => {
      const deadline = Date.now() + TIMEOUT_MS;

      function waitForExecute() {
        if (
          typeof grecaptcha          !== 'undefined' &&
          typeof grecaptcha.execute  === 'function'    // <-- key check: v3 method specifically
        ) {
          // Both the object and the execute method are ready — safe to call
          grecaptcha.ready(async () => {
            try {
              const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, {
                action: 'newsletter_signup'
              });

              // execute() resolved but returned nothing — treat as a failure
              if (!token) {
                const msg = 'reCAPTCHA returned an empty token — check site key and domain allowlist';
                debugError(msg);
                return reject(new Error(msg));
              }

              debugSuccess(`Token acquired: ${token.substring(0, 20)}…`);
              resolve(token);

            } catch (err) {
              // execute() itself threw — surface the real reason
              debugError(`grecaptcha.execute() threw: ${err.message}`);
              reject(new Error(`reCAPTCHA execute failed: ${err.message}`));
            }
          });

        } else if (Date.now() < deadline) {
          // Not ready yet — wait one poll cycle and try again
          debugLog(`Waiting for grecaptcha.execute… (${POLL_MS}ms)`);
          setTimeout(waitForExecute, POLL_MS);

        } else {
          // Timed out — clear, actionable error message
          const msg =
            `reCAPTCHA did not become ready within ${TIMEOUT_MS / 1000}s. ` +
            'Verify the site key is correct and the script tag loaded successfully.';
          debugError(msg);
          reject(new Error(msg));
        }
      }

      waitForExecute(); // kick off immediately
    });
  }

  async function handleSubmit(e) {
    e.preventDefault();
    debugLog('===== FORM SUBMISSION STARTED =====');

    // Honeypot check — bots fill hidden fields, real users don't
    if (honeypotField.value) {
      debugWarn('Honeypot triggered — likely bot');
      showMessage("✓ You're on the list! We'll notify you when we launch.", 'success');
      emailInput.value = '';
      return;
    }

    const email = emailInput.value;
    debugLog(`Email: ${email}`);
    clearMessage();

    if (!email) {
      showMessage('Please enter your email address.', 'error');
      emailInput.focus();
      return;
    }

    if (!InputValidator.validateEmail(email)) {
      showMessage('Please enter a valid email address.', 'error');
      emailInput.focus();
      return;
    }

    setLoading(true);

    try {
      // Attempt reCAPTCHA — non-fatal if it fails (submission still proceeds)
      let recaptchaToken = '';
      try {
        recaptchaToken = await getRecaptchaToken();
      } catch (rcErr) {
        debugError(`reCAPTCHA skipped: ${rcErr.message}`);
      }

      const sanitizedEmail = InputValidator.sanitizeInput(email.toLowerCase());
      const clientId       = SecurityManager.generateClientId();

      debugLog(`Saving to Firestore: ${sanitizedEmail}`);

      const docRef = await addDoc(collection(db, 'newsletter_subscribers'), {
        email:          sanitizedEmail,
        source:         'coming_soon_page_v2',
        subscribedAt:   serverTimestamp(),
        userAgent:      navigator.userAgent.substring(0, 200),
        referrer:       document.referrer ? document.referrer.substring(0, 200) : 'direct',
        recaptchaToken: recaptchaToken ? recaptchaToken.substring(0, 100) : 'not_provided',
        clientId,
        timestamp:      new Date().toISOString()
      });

      debugSuccess(`Firestore doc ID: ${docRef.id}`);

      // Cache locally so duplicate submissions can be caught client-side
      try {
        const signups = JSON.parse(localStorage.getItem('janedore_signups') || '[]');
        if (!signups.includes(sanitizedEmail)) {
          signups.push(sanitizedEmail);
          localStorage.setItem('janedore_signups', JSON.stringify(signups.slice(-10)));
        }
      } catch (_) { /* localStorage unavailable — not critical */ }

      showMessage("✓ You're on the list! We'll notify you when we launch.", 'success');
      emailInput.value = '';
      debugSuccess('Submission complete');

    } catch (error) {
      debugError(`SUBMISSION FAILED — code: ${error.code || 'n/a'} — ${error.message}`);

      if (error.code === 'permission-denied') {
        showMessage('Database permission error. Check Firestore rules.', 'error');
      } else if (error.code === 'unavailable') {
        showMessage('Network error. Please check your connection.', 'error');
      } else if (error.message.includes('AppCheck')) {
        showMessage('Security verification failed. Please refresh and try again.', 'error');
      } else {
        showMessage(`Error: ${error.message}`, 'error');
      }
    } finally {
      setLoading(false);
      debugLog('===== FORM SUBMISSION ENDED =====');
    }
  }

  form.addEventListener('submit', handleSubmit);
  debugLog('Submit listener attached');

  emailInput.addEventListener('input', () => {
    if (formMessage.classList.contains('error')) clearMessage();
  });

  // Prevent page-level scrolling
  window.addEventListener('scroll', () => window.scrollTo(0, 0), { passive: false });
  window.addEventListener('touchmove', (e) => {
    if (!e.target.closest('.coming-soon-container')) e.preventDefault();
  }, { passive: false });
  document.body.addEventListener('wheel', (e) => {
    const c = document.querySelector('.coming-soon-container');
    if (c && !c.contains(e.target)) e.preventDefault();
  }, { passive: false });

  SecurityManager.generateClientId();
  debugSuccess('🚀 Page ready');
  debugLog('Submit an email to test — watch this console for detailed output');

  // Ctrl+Shift+D toggles the debug panel on/off
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === 'D')
      debugConsole.classList.toggle('show');
  });

</script>
</body>
</html>
