<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Janedore · Coming Soon</title>

<!-- SEO Meta Tags -->

<meta name="description" content="Janedore - The rarest finds, within reach. Something extraordinary is coming. Sign up to be the first to know when we launch.">
<meta name="keywords" content="fashion, clothing, accessories, curated fashion, South Africa, coming soon">
<meta name="author" content="Janedore">
<meta name="robots" content="index, follow">

<!-- Open Graph / Social Media -->

<meta property="og:title" content="Janedore · Coming Soon">
<meta property="og:description" content="The rarest finds, within reach. Sign up to be the first to know when we launch.">
<meta property="og:image" content="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/IMG_5654.jpeg">
<meta property="og:url" content="https://janedore.co.za">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Janedore · Coming Soon">
<meta name="twitter:description" content="The rarest finds, within reach.">
<meta name="twitter:image" content="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/IMG_5654.jpeg">

<!-- Canonical URL -->

<link rel="canonical" href="https://janedore.co.za">

<!-- Theme Color -->

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- Preconnect -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">

<!-- Fonts -->

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/phosphor-icons"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    background: #000000;
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
    height: 100vh;
    margin: 0;
    overscroll-behavior: none;
  }

  /* ── Store owner link ── moved up slightly from bottom */
  .store-owner-link {
    position: fixed;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.25);
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: color 0.2s;
    z-index: 10;
    background: transparent;
    padding: 6px 0;
    white-space: nowrap;
  }

  .store-owner-link:hover {
    color: rgba(255, 255, 255, 0.6);
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  .store-owner-link:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 4px;
  }

  /* ── "Let me know when you launch" trigger at very bottom ── */
  .notify-trigger {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.3px;
    cursor: pointer;
    z-index: 10;
    white-space: nowrap;
    background: transparent;
    border: none;
    padding: 6px 0;
    transition: color 0.2s;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(255, 255, 255, 0.2);
  }

  .notify-trigger:hover {
    color: rgba(255, 255, 255, 0.85);
    text-decoration-color: rgba(255, 255, 255, 0.5);
  }

  .notify-trigger:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 4px;
  }

  /* ── Newsletter overlay ── */
  .newsletter-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .newsletter-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .newsletter-sheet {
    width: 100%;
    max-width: 520px;
    background: #0a0a0a;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding: 36px 28px 40px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    position: relative;
  }

  .newsletter-overlay.open .newsletter-sheet {
    transform: translateY(0);
  }

  .newsletter-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.4);
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }

  .newsletter-close:hover { color: #ffffff; }

  .newsletter-close:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .newsletter-close i { font-size: 20px; }

  .newsletter-title {
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 0.5px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .input-wrapper {
    position: relative;
    width: 100%;
    margin-bottom: 8px;
  }

  .email-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    padding: 16px 48px 16px 0;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #ffffff;
    outline: none;
    transition: border-color 0.3s ease;
    -webkit-appearance: none;
  }

  .email-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
    font-weight: 300;
  }

  .email-input:focus {
    border-bottom-color: #ffffff;
  }

  .submit-btn {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 8px;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: color 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .submit-btn:hover { color: #ffffff; }

  .submit-btn:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .submit-btn i { font-size: 24px; }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .form-message {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 400;
    min-height: 32px;
    padding: 8px 0;
    text-align: left;
    display: none;
  }

  .form-message.show    { display: block; }
  .form-message.success { color: #4ade80; }
  .form-message.error   { color: #f87171; }
  .form-message.info    { color: rgba(255, 255, 255, 0.6); }

  .legal-text {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.35);
    line-height: 1.6;
    margin-top: 14px;
  }

  .legal-text a {
    color: rgba(255, 255, 255, 0.5);
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.2s;
  }

  .legal-text a:hover { color: rgba(255, 255, 255, 0.8); }

  /* ── Main container ── */
  .coming-soon-container {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: fadeIn 1.2s ease-out;
    height: auto;
    max-height: 100vh;
    overflow-y: auto;
    padding: 40px 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .coming-soon-container::-webkit-scrollbar {
    display: none;
  }

  @keyframes fadeIn {
    0%  { opacity: 0; transform: translateY(20px); }
    100%{ opacity: 1; transform: translateY(0); }
  }

  .logo-wrapper {
    margin-top: 24px;
    margin-bottom: 16px;
  }

  .logo {
    width: 100%;
    max-width: 180px;
    height: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin: 0 auto;
  }

  /* ── "Coming soon." text beneath logo ── */
  .coming-soon-text {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .social-link {
    color: rgba(255, 255, 255, 0.4);
    font-size: 16px;
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    min-width: 32px;
  }

  .social-link:hover { color: rgba(255, 255, 255, 0.8); }

  .social-link:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .footer-note {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.25);
    margin-left: 8px;
  }

  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: #ffffff;
    color: #000000;
    padding: 8px 16px;
    z-index: 10000;
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
  }

  .skip-link:focus { top: 0; }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }
</style>

</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<main id="main-content" class="coming-soon-container">

  <div class="logo-wrapper">
    <img class="logo"
         src="https://cdn.shopify.com/s/files/1/0705/5615/6145/files/janedore-logo.png?v=1776021202"
         alt="Janedore">
  </div>

  <p class="coming-soon-text">Coming soon.</p>

  <div class="footer-row">
    <a href="https://www.instagram.com/janedor.e" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Instagram">
      <i class="ph ph-instagram-logo" aria-hidden="true"></i>
    </a>
    <a href="#" class="social-link" aria-label="TikTok">
      <i class="ph ph-tiktok-logo" aria-hidden="true"></i>
    </a>
    <a href="#" class="social-link" aria-label="Pinterest">
      <i class="ph ph-pinterest-logo" aria-hidden="true"></i>
    </a>
    <p class="footer-note" id="footer-note"></p>
  </div>

</main>

<!-- Store owner link — fixed, above the notify trigger -->

<a href="admin.html" class="store-owner-link" aria-label="Store owner login">Are you the store owner? Login.</a>

<!-- "Let me know when you launch" — pinned to very bottom -->

<button class="notify-trigger" id="notify-trigger" aria-label="Let me know when you launch">
  Let me know when you launch.
</button>

<!-- Newsletter bottom sheet overlay -->

<div class="newsletter-overlay" id="newsletter-overlay" role="dialog" aria-modal="true" aria-label="Newsletter signup">
  <div class="newsletter-sheet">
    <button class="newsletter-close" id="newsletter-close" aria-label="Close">
      <i class="ph ph-x" aria-hidden="true"></i>
    </button>
    <p class="newsletter-title">Stay in the loop</p>
    <form id="signup-form" onsubmit="return false;">
      <div class="input-wrapper">
        <label for="email-input" class="sr-only">Email address</label>
        <input type="email"
               class="email-input"
               id="email-input"
               placeholder="Enter your email"
               aria-label="Email address for launch notification"
               required>
        <button type="submit" class="submit-btn" id="submit-btn" aria-label="Subscribe">
          <i class="ph ph-arrow-right" id="arrow-icon" aria-hidden="true"></i>
          <span id="btn-spinner" class="spinner" style="display:none;"></span>
        </button>
      </div>
      <div class="form-message" id="form-message" role="status" aria-live="polite"></div>
      <p class="legal-text">
        By signing up, you agree to receive emails from Janedore. We respect your privacy —
        <a href="unsubscribe.html" aria-label="Unsubscribe from Janedore emails">unsubscribe anytime</a>.
      </p>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBjtD9j-jKHtjMVmI2ENxy0T3ts9uf2JNI",
    authDomain: "janedore-9f035.firebaseapp.com",
    projectId: "janedore-9f035",
    storageBucket: "janedore-9f035.firebasestorage.app",
    messagingSenderId: "571299748651",
    appId: "1:571299748651:web:01463a772d47b39cc4036e",
    measurementId: "G-Y9NMT0ZGKZ"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const form           = document.getElementById('signup-form');
  const emailInput     = document.getElementById('email-input');
  const submitBtn      = document.getElementById('submit-btn');
  const btnSpinner     = document.getElementById('btn-spinner');
  const arrowIcon      = document.getElementById('arrow-icon');
  const formMessage    = document.getElementById('form-message');
  const overlay        = document.getElementById('newsletter-overlay');
  const notifyTrigger  = document.getElementById('notify-trigger');
  const closeBtn       = document.getElementById('newsletter-close');

  // ── Footer year ──────────────────────────────────────────────────────────
  document.getElementById('footer-note').innerHTML =
    `&copy; ${new Date().getFullYear()} Janedore. All rights reserved.`;

  // ── Overlay open / close ──────────────────────────────────────────────────
  function openOverlay() {
    overlay.classList.add('open');
    emailInput.focus();
  }

  function closeOverlay() {
    overlay.classList.remove('open');
  }

  notifyTrigger.addEventListener('click', openOverlay);
  closeBtn.addEventListener('click', closeOverlay);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeOverlay();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay();
  });

  // ── Rate limiter ──────────────────────────────────────────────────────────
  const RateLimiter = {
    attempts: {},
    check(key, limit = 5, windowMs = 300000) {
      const now = Date.now();
      this.attempts[key] = (this.attempts[key] || []).filter(t => now - t < windowMs);
      if (this.attempts[key].length >= limit) return false;
      this.attempts[key].push(now);
      return true;
    }
  };

  // ── Helpers ───────────────────────────────────────────────────────────────
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function showMessage(text, type) {
    formMessage.textContent = text;
    formMessage.className = `form-message show ${type}`;
  }

  function clearMessage() {
    formMessage.className = 'form-message';
    formMessage.textContent = '';
  }

  function setLoading(isLoading) {
    submitBtn.disabled       = isLoading;
    arrowIcon.style.display  = isLoading ? 'none'         : 'block';
    btnSpinner.style.display = isLoading ? 'inline-block' : 'none';
  }

  // ── Submit handler ────────────────────────────────────────────────────────
  async function handleSubmit(e) {
    e.preventDefault();
    const email = emailInput.value.trim().toLowerCase();

    if (!email) {
      showMessage('Please enter your email address.', 'error');
      emailInput.focus();
      return;
    }

    if (!isValidEmail(email)) {
      showMessage('Please enter a valid email address.', 'error');
      emailInput.focus();
      return;
    }

    const clientId = localStorage.getItem('janedore_client_id') ||
      'client_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('janedore_client_id', clientId);

    if (!RateLimiter.check(clientId + '_signup')) {
      showMessage('Too many attempts. Please wait a few minutes.', 'error');
      return;
    }

    clearMessage();
    setLoading(true);

    try {
      const docId  = email.replace(/\./g, '_');
      const docRef = doc(db, "newsletter_subscribers", docId);

      const existing = await getDoc(docRef);

      if (existing.exists()) {
        showMessage("You're already on the list — we'll be in touch!", 'info');
        setLoading(false);
        return;
      }

      await setDoc(docRef, {
        email: email,
        source: 'coming_soon_page',
        subscribedAt: serverTimestamp(),
        userAgent: navigator.userAgent,
        referrer: document.referrer || 'direct'
      });

      showMessage("✓ You're on the list! We'll notify you when we launch.", 'success');
      emailInput.value = '';

      if (typeof gtag !== 'undefined') {
        gtag('event', 'coming_soon_signup', {
          event_category: 'engagement',
          event_label: 'Coming Soon Page'
        });
      }

    } catch (error) {
      console.error('[Janedore] Subscription error:', error.code, error.message);

      if (error.code === 'permission-denied') {
        showMessage('Unable to subscribe right now — please try again later.', 'error');
      } else if (error.code === 'unavailable' || (error.message && error.message.includes('network'))) {
        showMessage('No connection. Please check your internet and try again.', 'error');
      } else {
        showMessage('Something went wrong. Please try again.', 'error');
      }
    } finally {
      setLoading(false);
    }
  }

  form.addEventListener('submit', handleSubmit);
  emailInput.addEventListener('input', () => {
    if (formMessage.classList.contains('error')) clearMessage();
  });

  // ── Prevent page scroll ───────────────────────────────────────────────────
  window.addEventListener('scroll', () => window.scrollTo(0, 0), { passive: false });

  window.addEventListener('touchmove', (e) => {
    if (!e.target.closest('.coming-soon-container')) e.preventDefault();
  }, { passive: false });

  document.body.addEventListener('wheel', (e) => {
    const container = document.querySelector('.coming-soon-container');
    if (container && !container.contains(e.target)) e.preventDefault();
  }, { passive: false });
</script>

</body>
</html>
