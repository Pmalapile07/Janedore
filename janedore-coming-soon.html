<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Janedore · Coming Soon</title>

<!-- SEO Meta Tags -->
<meta name="description" content="Janedore - The rarest finds, within reach. Something extraordinary is coming. Sign up to be the first to know when we launch.">
<meta name="keywords" content="fashion, clothing, accessories, curated fashion, South Africa, coming soon">
<meta name="author" content="Janedore">
<meta name="robots" content="index, follow">

<!-- Open Graph / Social Media -->
<meta property="og:title" content="Janedore · Coming Soon">
<meta property="og:description" content="The rarest finds, within reach. Sign up to be the first to know when we launch.">
<meta property="og:image" content="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/IMG_5654.jpeg">
<meta property="og:url" content="https://janedore.co.za">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Janedore · Coming Soon">
<meta name="twitter:description" content="The rarest finds, within reach.">
<meta name="twitter:image" content="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/IMG_5654.jpeg">

<!-- Canonical URL -->
<link rel="canonical" href="https://janedore.co.za">

<!-- Theme Color -->
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- Preconnect -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/phosphor-icons"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    background: #000000;
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    zoom: 80%;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
    height: 100vh;
    margin: 0;
    overscroll-behavior: none;
  }

  .coming-soon-container {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: fadeIn 1.2s ease-out;
    height: auto;
    max-height: 100vh;
    overflow-y: auto;
    padding: 40px 0 20px 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
    position: relative;
  }

  .coming-soon-container::-webkit-scrollbar {
    display: none;
  }

  @keyframes fadeIn {
    0%  { opacity: 0; transform: translateY(20px); }
    100%{ opacity: 1; transform: translateY(0); }
  }

  .logo-wrapper {
    margin-top: 24px;
    margin-bottom: 8px;
  }

  .logo {
    width: 100%;
    max-width: 182px;
    height: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin: 0 auto;
  }

  .coming-soon-tagline {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    margin-bottom: 32px;
    text-align: center;
  }

  /* Newsletter form - slides up when revealed */
  .signup-form {
    width: 100%;
    margin-bottom: 24px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                opacity 0.3s ease-in-out,
                margin 0.3s ease;
  }

  .signup-form.visible {
    max-height: 300px;
    opacity: 1;
    margin-bottom: 24px;
  }

  .input-wrapper {
    position: relative;
    width: 100%;
    margin-bottom: 8px;
  }

  .email-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    padding: 16px 48px 16px 0;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #ffffff;
    outline: none;
    transition: border-color 0.3s ease;
    -webkit-appearance: none;
  }

  /* Remove yellow autofill background */
  .email-input:-webkit-autofill,
  .email-input:-webkit-autofill:hover,
  .email-input:-webkit-autofill:focus,
  .email-input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 30px #000000 inset !important;
    -webkit-text-fill-color: #ffffff !important;
    transition: background-color 5000s ease-in-out 0s;
  }

  .email-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
    font-weight: 300;
  }

  .email-input:focus {
    border-bottom-color: #ffffff;
  }

  .submit-btn {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 8px;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: color 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .submit-btn:hover { color: #ffffff; }

  .submit-btn:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .submit-btn i { font-size: 24px; }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .form-message {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 400;
    min-height: 32px;
    padding: 8px 0;
    text-align: left;
    display: none;
  }

  .form-message.show    { display: block; }
  .form-message.success { color: #4ade80; }
  .form-message.error   { color: #f87171; }
  .form-message.info    { color: rgba(255, 255, 255, 0.6); }

  .legal-text-newsletter {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.35);
    line-height: 1.6;
    margin-top: 12px;
    max-width: 400px;
    text-align: left;
  }

  .legal-text-newsletter a {
    color: rgba(255, 255, 255, 0.5);
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.2s;
  }

  .legal-text-newsletter a:hover { color: rgba(255, 255, 255, 0.8); }

  /* Bottom CTA - fixed at very bottom */
  .bottom-cta {
    position: fixed;
    bottom: 16px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }

  .launch-trigger {
    display: inline-block;
    background: transparent;
    border: none;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    text-decoration: none;
    cursor: pointer;
    padding: 8px 16px;
    letter-spacing: 0.3px;
    transition: color 0.2s;
    pointer-events: auto;
    -webkit-appearance: none;
    background: transparent;
  }

  .launch-trigger:hover {
    color: #ffffff;
  }

  .launch-trigger:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 4px;
  }

  /* Fixed bottom footer - appears when form is revealed */
  .fixed-bottom-footer {
    position: fixed;
    bottom: 16px;
    left: 0;
    right: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 25;
    pointer-events: auto;
  }

  .fixed-bottom-footer.visible {
    display: flex;
  }

  .back-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }

  .back-btn {
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    padding: 8px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-appearance: none;
  }

  .back-btn:hover {
    color: #ffffff;
  }

  .back-btn i {
    font-size: 20px;
  }

  .social-icons-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-bottom: 6px;
  }

  .social-link {
    color: rgba(255, 255, 255, 0.4);
    font-size: 16px;
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    min-width: 32px;
  }

  .social-link:hover { color: rgba(255, 255, 255, 0.8); }

  .social-link:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .copyright-text {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.25);
  }

  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: #ffffff;
    color: #000000;
    padding: 8px 16px;
    z-index: 10000;
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
  }

  .skip-link:focus { top: 0; }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }

  .coming-soon-container {
    padding-bottom: 70px;
  }
</style>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<main id="main-content" class="coming-soon-container">

  <div class="logo-wrapper">
    <img class="logo"
         src="https://cdn.shopify.com/s/files/1/0705/5615/6145/files/janedore-logo.png?v=1776021202"
         alt="Janedore">
  </div>

  <div class="coming-soon-tagline">Coming soon</div>

  <!-- Newsletter form - slides up when revealed -->
  <form class="signup-form" id="signup-form" onsubmit="return false;">
    <div class="input-wrapper">
      <label for="email-input" class="sr-only">Email address</label>
      <input type="email"
             class="email-input"
             id="email-input"
             placeholder="Enter your email"
             aria-label="Email address for launch notification"
             autocomplete="off"
             required>
      <button type="submit" class="submit-btn" id="submit-btn" aria-label="Subscribe">
        <i class="ph ph-arrow-right" id="arrow-icon" aria-hidden="true"></i>
        <span id="btn-spinner" class="spinner" style="display:none;"></span>
      </button>
    </div>
    <div class="form-message" id="form-message" role="status" aria-live="polite"></div>
    <p class="legal-text-newsletter">
      By signing up, you agree to receive emails from Janedore. We respect your privacy — 
      <a href="unsubscribe.html" aria-label="Unsubscribe from Janedore emails">unsubscribe anytime</a>.
    </p>
  </form>

</main>

<!-- Fixed bottom CTA (initial state) -->
<div class="bottom-cta" id="bottom-cta">
  <button class="launch-trigger" id="reveal-newsletter-btn" aria-label="Let me know when you launch">Let me know when you launch</button>
</div>

<!-- Fixed bottom footer (appears when form is revealed) -->
<div class="fixed-bottom-footer" id="fixed-bottom-footer">
  <div class="back-row">
    <button class="back-btn" id="back-btn" aria-label="Go back">
      <i class="ph ph-arrow-left" aria-hidden="true"></i>
    </button>
  </div>
  <div class="social-icons-row">
    <a href="https://www.instagram.com/janedor.e" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Instagram">
      <i class="ph ph-instagram-logo" aria-hidden="true"></i>
    </a>
    <a href="#" class="social-link" aria-label="TikTok">
      <i class="ph ph-tiktok-logo" aria-hidden="true"></i>
    </a>
    <a href="#" class="social-link" aria-label="Pinterest">
      <i class="ph ph-pinterest-logo" aria-hidden="true"></i>
    </a>
  </div>
  <p class="copyright-text" id="copyright-text"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBjtD9j-jKHtjMVmI2ENxy0T3ts9uf2JNI",
    authDomain: "janedore-9f035.firebaseapp.com",
    projectId: "janedore-9f035",
    storageBucket: "janedore-9f035.firebasestorage.app",
    messagingSenderId: "571299748651",
    appId: "1:571299748651:web:01463a772d47b39cc4036e",
    measurementId: "G-Y9NMT0ZGKZ"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const form          = document.getElementById('signup-form');
  const emailInput    = document.getElementById('email-input');
  const submitBtn     = document.getElementById('submit-btn');
  const btnSpinner    = document.getElementById('btn-spinner');
  const arrowIcon     = document.getElementById('arrow-icon');
  const formMessage   = document.getElementById('form-message');
  const revealBtn     = document.getElementById('reveal-newsletter-btn');
  const backBtn       = document.getElementById('back-btn');
  const bottomCta     = document.getElementById('bottom-cta');
  const fixedFooter   = document.getElementById('fixed-bottom-footer');
  const copyrightText = document.getElementById('copyright-text');

  // Set copyright year
  copyrightText.innerHTML = `&copy; ${new Date().getFullYear()} Janedore. All rights reserved.`;

  // Show newsletter form, hide bottom CTA, show fixed footer
  revealBtn.addEventListener('click', function() {
    form.classList.add('visible');
    bottomCta.style.display = 'none';
    fixedFooter.classList.add('visible');
    
    setTimeout(() => {
      emailInput.focus();
    }, 100);
  });

  // Back button: hide form, show bottom CTA, hide fixed footer
  backBtn.addEventListener('click', function() {
    form.classList.remove('visible');
    bottomCta.style.display = 'block';
    fixedFooter.classList.remove('visible');
    
    // Clear any messages
    formMessage.className = 'form-message';
    formMessage.textContent = '';
  });

  const RateLimiter = {
    attempts: {},
    check(key, limit = 5, windowMs = 300000) {
      const now = Date.now();
      this.attempts[key] = (this.attempts[key] || []).filter(t => now - t < windowMs);
      if (this.attempts[key].length >= limit) return false;
      this.attempts[key].push(now);
      return true;
    }
  };

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function showMessage(text, type) {
    formMessage.textContent = text;
    formMessage.className = `form-message show ${type}`;
  }

  function clearMessage() {
    formMessage.className = 'form-message';
    formMessage.textContent = '';
  }

  function setLoading(isLoading) {
    submitBtn.disabled       = isLoading;
    arrowIcon.style.display  = isLoading ? 'none'         : 'block';
    btnSpinner.style.display = isLoading ? 'inline-block' : 'none';
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const email = emailInput.value.trim().toLowerCase();

    if (!email) {
      showMessage('Please enter your email address.', 'error');
      emailInput.focus();
      return;
    }

    if (!isValidEmail(email)) {
      showMessage('Please enter a valid email address.', 'error');
      emailInput.focus();
      return;
    }

    const clientId = localStorage.getItem('janedore_client_id') ||
      'client_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('janedore_client_id', clientId);

    if (!RateLimiter.check(clientId + '_signup')) {
      showMessage('Too many attempts. Please wait a few minutes.', 'error');
      return;
    }

    clearMessage();
    setLoading(true);

    try {
      const docId  = email.replace(/\./g, '_');
      const docRef = doc(db, "newsletter_subscribers", docId);

      const existing = await getDoc(docRef);

      if (existing.exists()) {
        showMessage("You're already on the list — we'll be in touch!", 'info');
        setLoading(false);
        return;
      }

      await setDoc(docRef, {
        email: email,
        source: 'coming_soon_page',
        subscribedAt: serverTimestamp(),
        userAgent: navigator.userAgent,
        referrer: document.referrer || 'direct'
      });

      showMessage("✓ You're on the list! We'll notify you when we launch.", 'success');
      emailInput.value = '';

      if (typeof gtag !== 'undefined') {
        gtag('event', 'coming_soon_signup', {
          event_category: 'engagement',
          event_label: 'Coming Soon Page'
        });
      }

    } catch (error) {
      console.error('[Janedore] Subscription error:', error.code, error.message);

      if (error.code === 'permission-denied') {
        showMessage('Unable to subscribe right now — please try again later.', 'error');
      } else if (error.code === 'unavailable' || (error.message && error.message.includes('network'))) {
        showMessage('No connection. Please check your internet and try again.', 'error');
      } else {
        showMessage('Something went wrong. Please try again.', 'error');
      }
    } finally {
      setLoading(false);
    }
  }

  form.addEventListener('submit', handleSubmit);
  emailInput.addEventListener('input', () => {
    if (formMessage.classList.contains('error')) clearMessage();
  });

  window.addEventListener('scroll', () => window.scrollTo(0, 0), { passive: false });

  window.addEventListener('touchmove', (e) => {
    if (!e.target.closest('.coming-soon-container')) e.preventDefault();
  }, { passive: false });

  document.body.addEventListener('wheel', (e) => {
    const container = document.querySelector('.coming-soon-container');
    if (container && !container.contains(e.target)) e.preventDefault();
  }, { passive: false });
</script>

</body>
</html>
