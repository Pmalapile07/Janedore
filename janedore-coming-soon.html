<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    background: #000000;
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    position: relative;
    height: 100vh;
    margin: 0;
    overscroll-behavior: none;
  }

  /* ‚îÄ‚îÄ Store owner ‚Äî top right ‚îÄ‚îÄ */
  .store-owner-link {
    position: fixed;
    top: 24px;
    right: 24px;
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.35);
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: color 0.2s;
    z-index: 200;
  }

  .store-owner-link:hover {
    color: rgba(255, 255, 255, 0.7);
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  .store-owner-link:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 4px;
  }

  /* ‚îÄ‚îÄ Single screen ‚Äî everything lives here, no overflow ‚îÄ‚îÄ */
  .screen {
    width: 100%;
    max-width: 520px;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* ‚îÄ‚îÄ Hero block: logo + coming soon ‚Äî animated upward on open ‚îÄ‚îÄ */
  .hero {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-62%);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: top 0.48s cubic-bezier(0.32, 0.72, 0, 1),
                transform 0.48s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .screen.sheet-open .hero {
    top: 68px;
    transform: translateY(0);
  }

  .logo-wrapper {
    margin-bottom: 20px;
  }

  .logo {
    width: 100%;
    max-width: 180px;
    height: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin: 0 auto;
  }

  .coming-soon-text {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.82);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ‚îÄ‚îÄ Bottom sheet ‚Äî slides up inside the screen ‚îÄ‚îÄ */
  .bottom-sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #000000;
    border-top: 1px solid rgba(255, 255, 255, 0.07);
    padding: 32px 24px 52px;
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .screen.sheet-open .bottom-sheet {
    transform: translateY(0);
  }

  .sheet-close {
    position: absolute;
    top: 14px;
    right: 18px;
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.35);
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }

  .sheet-close:hover { color: #ffffff; }

  .sheet-close:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .sheet-close i { font-size: 18px; }

  /* Social icons row inside the sheet */
  .social-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0px;
    margin-bottom: 24px;
  }

  .social-link {
    color: rgba(255, 255, 255, 0.4);
    font-size: 18px;
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    min-width: 32px;
  }

  .social-link:hover { color: rgba(255, 255, 255, 0.85); }

  .social-link:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  /* Input */
  .input-wrapper {
    position: relative;
    width: 100%;
    margin-bottom: 6px;
  }

  .email-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    padding: 14px 48px 14px 0;
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: #ffffff;
    outline: none;
    transition: border-color 0.3s ease;
    -webkit-appearance: none;
  }

  .email-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
    font-weight: 300;
  }

  .email-input:focus {
    border-bottom-color: #ffffff;
  }

  .submit-btn {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 8px;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: color 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .submit-btn:hover { color: #ffffff; }

  .submit-btn:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .submit-btn i { font-size: 22px; }

  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .form-message {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 400;
    min-height: 26px;
    padding: 5px 0;
    text-align: left;
    display: none;
  }

  .form-message.show    { display: block; }
  .form-message.success { color: #4ade80; }
  .form-message.error   { color: #f87171; }
  .form-message.info    { color: rgba(255, 255, 255, 0.6); }

  .legal-text {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.28);
    line-height: 1.65;
    margin-top: 12px;
  }

  .legal-text a {
    color: rgba(255, 255, 255, 0.45);
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.2s;
  }

  .legal-text a:hover { color: rgba(255, 255, 255, 0.8); }

  /* ‚îÄ‚îÄ "Let me know when you launch" trigger ‚Äî very bottom ‚îÄ‚îÄ */
  .notify-trigger {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.2px;
    cursor: pointer;
    z-index: 10;
    white-space: nowrap;
    background: transparent;
    border: none;
    padding: 6px 0;
    transition: color 0.2s, opacity 0.3s;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(255, 255, 255, 0.15);
  }

  .notify-trigger:hover {
    color: rgba(255, 255, 255, 0.85);
    text-decoration-color: rgba(255, 255, 255, 0.45);
  }

  .notify-trigger:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 4px;
  }

  .notify-trigger.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: #ffffff;
    color: #000000;
    padding: 8px 16px;
    z-index: 10000;
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
  }

  .skip-link:focus { top: 0; }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBjtD9j-jKHtjMVmI2ENxy0T3ts9uf2JNI",
    authDomain: "janedore-9f035.firebaseapp.com",
    projectId: "janedore-9f035",
    storageBucket: "janedore-9f035.firebasestorage.app",
    messagingSenderId: "571299748651",
    appId: "1:571299748651:web:01463a772d47b39cc4036e",
    measurementId: "G-Y9NMT0ZGKZ"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const screen        = document.querySelector('.screen');
  const notifyTrigger = document.getElementById('notify-trigger');
  const sheetClose    = document.getElementById('sheet-close');
  const form          = document.getElementById('signup-form');
  const emailInput    = document.getElementById('email-input');
  const submitBtn     = document.getElementById('submit-btn');
  const btnSpinner    = document.getElementById('btn-spinner');
  const arrowIcon     = document.getElementById('arrow-icon');
  const formMessage   = document.getElementById('form-message');

  // ‚îÄ‚îÄ Open / close ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  function openSheet() {
    screen.classList.add('sheet-open');
    notifyTrigger.classList.add('hidden');
    setTimeout(() => emailInput.focus(), 460);
  }

  function closeSheet() {
    screen.classList.remove('sheet-open');
    notifyTrigger.classList.remove('hidden');
  }

  notifyTrigger.addEventListener('click', openSheet);
  sheetClose.addEventListener('click', closeSheet);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && screen.classList.contains('sheet-open')) closeSheet();
  });

  // ‚îÄ‚îÄ Rate limiter ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  const RateLimiter = {
    attempts: {},
    check(key, limit = 5, windowMs = 300000) {
      const now = Date.now();
      this.attempts[key] = (this.attempts[key] || []).filter(t => now - t < windowMs);
      if (this.attempts[key].length >= limit) return false;
      this.attempts[key].push(now);
      return true;
    }
  };

  // ‚îÄ‚îÄ Helpers ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function showMessage(text, type) {
    formMessage.textContent = text;
    formMessage.className = `form-message show ${type}`;
  }

  function clearMessage() {
    formMessage.className = 'form-message';
    formMessage.textContent = '';
  }

  function setLoading(isLoading) {
    submitBtn.disabled       = isLoading;
    arrowIcon.style.display  = isLoading ? 'none'         : 'block';
    btnSpinner.style.display = isLoading ? 'inline-block' : 'none';
  }

  // ‚îÄ‚îÄ Submit handler ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  async function handleSubmit(e) {
    e.preventDefault();
    const email = emailInput.value.trim().toLowerCase();

    if (!email) {
      showMessage('Please enter your email address.', 'error');
      emailInput.focus();
      return;
    }

    if (!isValidEmail(email)) {
      showMessage('Please enter a valid email address.', 'error');
      emailInput.focus();
      return;
    }

    const clientId = localStorage.getItem('janedore_client_id') ||
      'client_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('janedore_client_id', clientId);

    if (!RateLimiter.check(clientId + '_signup')) {
      showMessage('Too many attempts. Please wait a few minutes.', 'error');
      return;
    }

    clearMessage();
    setLoading(true);

    try {
      const docId  = email.replace(/\./g, '_');
      const docRef = doc(db, "newsletter_subscribers", docId);

      const existing = await getDoc(docRef);

      if (existing.exists()) {
        showMessage("You're already on the list ‚Äî we'll be in touch!", 'info');
        setLoading(false);
        return;
      }

      await setDoc(docRef, {
        email: email,
        source: 'coming_soon_page',
        subscribedAt: serverTimestamp(),
        userAgent: navigator.userAgent,
        referrer: document.referrer || 'direct'
      });

      showMessage("‚úì You're on the list! We'll notify you when we launch.", 'success');
      emailInput.value = '';

      if (typeof gtag !== 'undefined') {
        gtag('event', 'coming_soon_signup', {
          event_category: 'engagement',
          event_label: 'Coming Soon Page'
        });
      }

    } catch (error) {
      console.error('[Janedore] Subscription error:', error.code, error.message);

      if (error.code === 'permission-denied') {
        showMessage('Unable to subscribe right now ‚Äî please try again later.', 'error');
      } else if (error.code === 'unavailable' || (error.message && error.message.includes('network'))) {
        showMessage('No connection. Please check your internet and try again.', 'error');
      } else {
        showMessage('Something went wrong. Please try again.', 'error');
      }
    } finally {
      setLoading(false);
    }
  }

  form.addEventListener('submit', handleSubmit);
  emailInput.addEventListener('input', () => {
    if (formMessage.classList.contains('error')) clearMessage();
  });

  // ‚îÄ‚îÄ Prevent page scroll ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  window.addEventListener('scroll', () => window.scrollTo(0, 0), { passive: false });

  window.addEventListener('touchmove', (e) => {
    if (!e.target.closest('.screen')) e.preventDefault();
  }, { passive: false });

  document.body.addEventListener('wheel', (e) => {
    const s = document.querySelector('.screen');
    if (s && !s.contains(e.target)) e.preventDefault();
  }, { passive: false });
</script>
