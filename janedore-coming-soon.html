<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    background: #000000;
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
    height: 100vh;
    margin: 0;
    overscroll-behavior: none;
  }

  .store-owner-link {
    position: fixed;
    top: 28px;
    right: 28px;
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.4);
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: color 0.2s;
    z-index: 10;
    background: transparent;
    padding: 6px 0;
  }

  .store-owner-link:hover {
    color: rgba(255, 255, 255, 0.75);
    text-decoration: underline;
    text-underline-offset: 4px;
  }

  .store-owner-link:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 4px;
  }

  .coming-soon-container {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: fadeIn 1.2s ease-out;
    height: auto;
    max-height: 100vh;
    overflow-y: auto;
    padding: 40px 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  
  .coming-soon-container::-webkit-scrollbar {
    display: none;
  }

  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .logo-wrapper {
    margin-top: 24px;
    margin-bottom: 40px;
  }

  .logo {
    width: 100%;
    max-width: 180px;
    height: auto;
    display: block;
    filter: brightness(0) invert(1);
    margin: 0 auto;
  }

  .signup-form {
    width: 100%;
    margin-bottom: 24px;
  }

  .input-wrapper {
    position: relative;
    width: 100%;
    margin-bottom: 8px;
  }

  .email-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    padding: 16px 48px 16px 0;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #ffffff;
    outline: none;
    transition: border-color 0.3s ease;
    -webkit-appearance: none;
  }

  .email-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
    font-weight: 300;
  }

  .email-input:focus {
    border-bottom-color: #ffffff;
  }

  .submit-btn {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 8px;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .submit-btn:hover {
    color: #ffffff;
  }

  .submit-btn:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .submit-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .submit-btn i {
    font-size: 24px;
  }

  .btn-text {
    display: none;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .form-message {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 400;
    min-height: 32px;
    padding: 8px 0;
    text-align: left;
    display: none;
  }

  .form-message.show {
    display: block;
  }

  .form-message.success {
    color: #4ade80;
  }

  .form-message.error {
    color: #f87171;
  }

  .form-message.info {
    color: rgba(255, 255, 255, 0.6);
  }

  .legal-text {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.35);
    line-height: 1.6;
    margin-top: 12px;
    max-width: 400px;
    text-align: left;
  }

  .legal-text a {
    color: rgba(255, 255, 255, 0.5);
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.2s;
  }

  .legal-text a:hover {
    color: rgba(255, 255, 255, 0.8);
  }

  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: #ffffff;
    color: #000000;
    padding: 8px 16px;
    z-index: 10000;
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
  }

  .skip-link:focus {
    top: 0;
  }

  /* REMOVED: This was hiding the reCAPTCHA badge */
  /* .grecaptcha-badge {
    visibility: hidden !important;
  } */

  .recaptcha-notice {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.25);
    margin-top: 8px;
    text-align: left;
  }

  .recaptcha-notice a {
    color: rgba(255, 255, 255, 0.4);
    text-decoration: underline;
  }

  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }
</style>

  <form class="signup-form" id="signup-form" onsubmit="return false;">

    <div class="input-wrapper">

<!-- Firebase Integration -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp, query, where, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";

  // Firebase configuration (frontend-safe)
  const firebaseConfig = {
    apiKey: "AIzaSyBjtD9j-jKHtjMVmI2ENxy0T3ts9uf2JNI",
    authDomain: "janedore-9f035.firebaseapp.com",
    projectId: "janedore-9f035",
    storageBucket: "janedore-9f035.firebasestorage.app",
    messagingSenderId: "571299748651",
    appId: "1:571299748651:web:01463a772d47b39cc4036e",
    measurementId: "G-Y9NMT0ZGKZ"
  };

  const app = initializeApp(firebaseConfig);
  
  // Initialize App Check with standard reCAPTCHA v3 (NOT Enterprise)
  const appCheck = initializeAppCheck(app, {
    provider: new ReCaptchaV3Provider("6LdKXQYrAAAAAJCnTWBZLXWxC-DCjQr7GkY2uGkG"),
    isTokenAutoRefreshEnabled: true
  });

  const db = getFirestore(app);

  const form = document.getElementById('signup-form');
  const emailInput = document.getElementById('email-input');
  const submitBtn = document.getElementById('submit-btn');
  const btnSpinner = document.getElementById('btn-spinner');
  const arrowIcon = document.getElementById('arrow-icon');
  const formMessage = document.getElementById('form-message');
  const honeypotField = document.getElementById('website-field');

  // Enhanced security: Server-side rate limiting simulation with exponential backoff
  const SecurityManager = {
    attempts: new Map(),
    blockedIPs: new Set(),
    maxAttempts: 5,
    windowMs: 300000, // 5 minutes
    baseDelay: 1000,
    
    async checkRateLimit(clientId) {
      const now = Date.now();
      const attempts = this.attempts.get(clientId) || [];
      const recentAttempts = attempts.filter(t => now - t < this.windowMs);
      
      if (recentAttempts.length >= this.maxAttempts) {
        const oldestAttempt = Math.min(...recentAttempts);
        const timeToWait = this.windowMs - (now - oldestAttempt);
        throw new Error(`RATE_LIMIT:${timeToWait}`);
      }
      
      recentAttempts.push(now);
      this.attempts.set(clientId, recentAttempts);
      
      // Clean up old entries periodically
      if (Math.random() < 0.1) {
        this.cleanup();
      }
      
      return recentAttempts.length;
    },
    
    cleanup() {
      const now = Date.now();
      for (const [key, attempts] of this.attempts.entries()) {
        const validAttempts = attempts.filter(t => now - t < this.windowMs);
        if (validAttempts.length === 0) {
          this.attempts.delete(key);
        } else {
          this.attempts.set(key, validAttempts);
        }
      }
    },
    
    generateClientId() {
      let clientId = localStorage.getItem('janedore_secure_client');
      if (!clientId) {
        clientId = 'jd_' + crypto.randomUUID();
        localStorage.setItem('janedore_secure_client', clientId);
      }
      return clientId;
    },
    
    async exponentialBackoff(attemptNumber) {
      const delay = this.baseDelay * Math.pow(2, attemptNumber - 1);
      await new Promise(resolve => setTimeout(resolve, delay));
    }
  };

  // Enhanced input validation
  class InputValidator {
    static validateEmail(email) {
      if (!email || typeof email !== 'string') return false;
      
      const trimmed = email.trim().toLowerCase();
      
      // Length checks
      if (trimmed.length < 5 || trimmed.length > 254) return false;
      
      // Basic format
      const emailRegex = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;
      if (!emailRegex.test(trimmed)) return false;
      
      // Check for common disposable email domains (basic check)
      const disposableDomains = ['tempmail', 'throwaway', 'guerrillamail', 'mailinator', '10minutemail', 'yopmail'];
      const domain = trimmed.split('@')[1];
      if (disposableDomains.some(d => domain.includes(d))) return false;
      
      // Check for suspicious patterns
      if (trimmed.includes('+') && trimmed.split('+')[0].length < 3) return false;
      
      return true;
    }
    
    static sanitizeInput(input) {
      if (!input) return '';
      return input
        .replace(/[<>]/g, '') // Remove angle brackets
        .replace(/javascript:/gi, '') // Remove javascript protocol
        .replace(/on\w+=/gi, '') // Remove event handlers
        .trim();
    }
    
    static async checkDuplicateEmail(email) {
      try {
        const q = query(
          collection(db, "newsletter_subscribers"),
          where("email", "==", email.toLowerCase()),
          limit(1)
        );
        const snapshot = await getDocs(q);
        return !snapshot.empty;
      } catch (error) {
        console.error('Duplicate check error:', error);
        return false; // Fail open but log
      }
    }
  }

  function showMessage(text, type) {
    formMessage.textContent = text;
    formMessage.className = `form-message show ${type}`;
  }

  function clearMessage() {
    formMessage.className = 'form-message';
    formMessage.textContent = '';
  }

  function setLoading(isLoading) {
    submitBtn.disabled = isLoading;
    emailInput.disabled = isLoading;
    if (isLoading) {
      arrowIcon.style.display = 'none';
      btnSpinner.style.display = 'inline-block';
    } else {
      arrowIcon.style.display = 'block';
      btnSpinner.style.display = 'none';
      emailInput.disabled = false;
    }
  }

  async function getRecaptchaToken() {
    return new Promise((resolve, reject) => {
      grecaptcha.ready(async () => {
        try {
          const token = await grecaptcha.execute('6LdKXQYrAAAAAJCnTWBZLXWxC-DCjQr7GkY2uGkG', {
            action: 'newsletter_signup'
          });
          resolve(token);
        } catch (error) {
          console.error('reCAPTCHA error:', error);
          reject(error);
        }
      });
    });
  }

  async function handleSubmit(e) {
    e.preventDefault();
    
    // Honeypot check
    if (honeypotField.value) {
      console.warn('Bot detected via honeypot');
      showMessage('✓ You\'re on the list! We\'ll notify you when we launch.', 'success');
      emailInput.value = '';
      return;
    }
    
    const email = emailInput.value;
    const clientId = SecurityManager.generateClientId();
    
    // Clear previous messages
    clearMessage();
    
    // Validate email
    if (!email) {
      showMessage('Please enter your email address.', 'error');
      emailInput.focus();
      return;
    }
    
    if (!InputValidator.validateEmail(email)) {
      showMessage('Please enter a valid email address.', 'error');
      emailInput.focus();
      return;
    }
    
    // Rate limiting check
    try {
      const attemptCount = await SecurityManager.checkRateLimit(clientId);
      if (attemptCount > 2) {
        await SecurityManager.exponentialBackoff(attemptCount - 2);
      }
    } catch (error) {
      if (error.message.startsWith('RATE_LIMIT')) {
        const waitTime = Math.ceil(parseInt(error.message.split(':')[1]) / 60000);
        showMessage(`Too many attempts. Please try again in ${waitTime} minute${waitTime > 1 ? 's' : ''}.`, 'error');
        return;
      }
    }
    
    setLoading(true);
    
    try {
      // Check for duplicate email
      const isDuplicate = await InputValidator.checkDuplicateEmail(email);
      if (isDuplicate) {
        showMessage('This email is already on our list! We\'ll notify you soon.', 'info');
        emailInput.value = '';
        setLoading(false);
        return;
      }
      
      // Get reCAPTCHA token
      let recaptchaToken = '';
      try {
        recaptchaToken = await getRecaptchaToken();
        console.log('reCAPTCHA token obtained successfully');
      } catch (recaptchaError) {
        console.error('Failed to get reCAPTCHA token:', recaptchaError);
        // Continue without token - App Check will handle verification
      }
      
      // Sanitize input
      const sanitizedEmail = InputValidator.sanitizeInput(email.toLowerCase());
      
      // Store in Firestore with security metadata
      await addDoc(collection(db, "newsletter_subscribers"), {
        email: sanitizedEmail,
        source: 'coming_soon_page_v2',
        subscribedAt: serverTimestamp(),
        userAgent: navigator.userAgent.substring(0, 200), // Limit length
        referrer: document.referrer ? document.referrer.substring(0, 200) : 'direct',
        recaptchaToken: recaptchaToken ? recaptchaToken.substring(0, 100) : 'app_check_verified', // Store partial token for audit
        clientId: clientId,
        ipHash: await crypto.subtle ? 'hashed' : 'unavailable' // Placeholder for IP hash
      });
      
      // Store locally for reference
      try {
        const signups = JSON.parse(localStorage.getItem('janedore_secure_signups') || '[]');
        if (!signups.includes(sanitizedEmail)) {
          signups.push(sanitizedEmail);
          localStorage.setItem('janedore_secure_signups', JSON.stringify(signups.slice(-10))); // Keep last 10
        }
      } catch (e) {
        // Ignore localStorage errors
      }
      
      showMessage('✓ You\'re on the list! We\'ll notify you when we launch.', 'success');
      emailInput.value = '';
      
      // Optional: Track conversion
      if (typeof gtag !== 'undefined') {
        gtag('event', 'coming_soon_signup_secure', {
          'event_category': 'engagement',
          'event_label': 'Coming Soon Page v2'
        });
      }
      
    } catch (error) {
      console.error('Submission error:', error);
      
      // Handle specific Firebase errors
      if (error.code === 'permission-denied') {
        showMessage('Unable to process request. Please try again later.', 'error');
      } else if (error.code === 'unavailable') {
        showMessage('Service temporarily unavailable. Please try again in a few minutes.', 'error');
      } else {
        showMessage('Something went wrong. Please try again.', 'error');
      }
    } finally {
      setLoading(false);
    }
  }

  // Event listeners
  form.addEventListener('submit', handleSubmit);
  
  emailInput.addEventListener('input', () => {
    if (formMessage.classList.contains('error')) {
      clearMessage();
    }
  });
  
  // Prevent scroll
  window.addEventListener('scroll', (e) => {
    window.scrollTo(0, 0);
  }, { passive: false });
  
  window.addEventListener('touchmove', (e) => {
    if (!e.target.closest('.coming-soon-container')) {
      e.preventDefault();
    }
  }, { passive: false });
  
  document.body.addEventListener('wheel', (e) => {
    const container = document.querySelector('.coming-soon-container');
    if (container && !container.contains(e.target)) {
      e.preventDefault();
    }
  }, { passive: false });
  
  // Security: Clear sensitive data on page unload
  window.addEventListener('beforeunload', () => {
    // Optional: Clear any temporary sensitive data
  });
  
  // Initialize security
  SecurityManager.generateClientId();
  
  // Log security initialization (development only)
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    console.log('🔒 Security initialized with App Check and standard reCAPTCHA v3');
  }
</script>
