<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/phosphor-icons"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getFirestore, 
collection, 
getDocs, 
doc, 
setDoc, 
deleteDoc, 
serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBjtD9j-jKHtjMVmI2ENxy0T3ts9uf2JNI",
authDomain: "janedore-9f035.firebaseapp.com",
projectId: "janedore-9f035",
storageBucket: "janedore-9f035.firebasestorage.app",
messagingSenderId: "571299748651",
appId: "1:571299748651:web:01463a772d47b39cc4036e",
measurementId: "G-Y9NMT0ZGKZ"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



window.debugLog = function(msg,type){

console.log(msg)

const panel = document.getElementById('debugPanel')
const content = document.getElementById('debugContent')

if(panel && content){

const line = document.createElement('div')

line.style.color =
type === 'error'
? '#c0392b'
: type === 'success'
? '#27ae60'
: '#111'

line.style.fontSize = '11px'
line.style.fontFamily = 'monospace'
line.style.padding = '2px 0'

line.textContent =
new Date().toLocaleTimeString() + ' - ' + msg

content.appendChild(line)
content.scrollTop = content.scrollHeight

}

}



window.firebaseLoadProducts = async function(){

try{

window.debugLog('Loading products...','info')

const snap = await getDocs(collection(db,"products"))

const products = []

snap.forEach(docSnap => {

const data = docSnap.data()

products.push({

id: docSnap.id,
name: data.name || '',
price: data.price || '',
priceN: data.priceN || 0,
description: data.description || '',
category: data.category || 'clothing',
imgSrc: data.imgSrc || '',
images: data.images || [],
sizes: data.sizes || ['XS','S','M','L','XL'],
colors: data.colors || [],
variants: data.variants || [],
isFeatured: data.isFeatured || false,
isNewArrival: data.isNewArrival || false

})

})

window.debugLog('Loaded ' + products.length + ' products','success')

return products

}catch(e){

window.debugLog('Error: ' + e.message,'error')
return []

}

}



window.firebaseSaveProduct = async function(productId,productData){

try{

window.debugLog('Saving: ' + productId,'info')

await setDoc(
doc(db,"products",productId),
{
...productData,
updatedAt: serverTimestamp()
}
)

window.debugLog('Saved successfully!','success')

return {ok:true}

}catch(e){

window.debugLog('Save error: ' + e.message,'error')

return {
ok:false,
error:e.message
}

}

}



window.firebaseDeleteProduct = async function(productId){

try{

window.debugLog('Deleting: ' + productId,'info')

await deleteDoc(doc(db,"products",productId))

window.debugLog('Deleted!','success')

return {ok:true}

}catch(e){

window.debugLog('Delete error: ' + e.message,'error')

return {
ok:false,
error:e.message
}

}

}



window.addEventListener('DOMContentLoaded',()=>{
window.debugLog('Admin ready','success')
if(typeof window.loadList === 'function') window.loadList()
})

</script>


<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'DM Sans',sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:1200px;
margin:0 auto;
background:#fff;
border-radius:8px;
padding:24px;
box-shadow:0 2px 8px rgba(0,0,0,0.1)
}

h1{
font-size:24px;
font-weight:500;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center
}

.btn{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
font-weight:500
}

.btn-primary{
background:#1a1a1a;
color:#fff
}

.btn-danger{
background:#c0392b;
color:#fff
}

.btn-ghost{
background:none;
color:#666
}

.btn-sm{
padding:6px 12px;
font-size:12px
}

.product-item{
display:flex;
align-items:center;
padding:16px;
border-bottom:1px solid #eee;
gap:16px
}

.product-img{
width:60px;
height:80px;
object-fit:cover;
border-radius:4px;
background:#eee
}

.product-img-placeholder{
width:60px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
background:#eee;
border-radius:4px;
color:#999
}

.product-info{flex:1}

.product-name{
font-weight:500;
margin-bottom:4px
}

.product-meta{
font-size:13px;
color:#666;
display:flex;
gap:16px;
flex-wrap:wrap
}

.badge{
background:#e0e0e0;
padding:2px 8px;
border-radius:20px;
font-size:11px
}

.badge.featured{
background:#1a1a1a;
color:#fff
}

.badge.new{
background:#27ae60;
color:#fff
}

</style>
</head>


<body>

<div class="container">

<h1>

Products

<button class="btn btn-primary" onclick="openModal()">
<i class="ph ph-plus"></i> New Product
</button>

</h1>

<div id="productList">
<div style="text-align:center;padding:40px">Loading...</div>
</div>

</div>



<script>

var currentProducts=[]
var editingId=null



function loadList(){

window.firebaseLoadProducts().then(products=>{

currentProducts=products

const container=document.getElementById('productList')

if(products.length===0){

container.innerHTML='<div style="text-align:center;padding:40px;color:#999;">No products yet</div>'

return
}

let html=''

products.forEach(p=>{

let badges=''

if(p.isFeatured) badges+='<span class="badge featured">Featured</span>'
if(p.isNewArrival) badges+='<span class="badge new">New</span>'

badges+='<span class="badge">'+(p.category||'clothing')+'</span>'


html+=`

<div class="product-item">

${p.imgSrc
? `<img class="product-img" src="${p.imgSrc}">`
: `<div class="product-img-placeholder"><i class="ph ph-image"></i></div>`
}

<div class="product-info">

<div class="product-name">${p.name||'Untitled'}</div>

<div class="product-meta">

<span>${p.price||'R 0.00'}</span>
<span>${p.sizes?.length||0} sizes</span>
<span>${p.variants?.length||0} variants</span>

${badges}

</div>

</div>

<button class="btn btn-ghost btn-sm" onclick="editProduct('${p.id}')">
<i class="ph ph-pencil"></i>
</button>

</div>
`

})

container.innerHTML=html

})

}



async function saveProduct(){

const name=document.getElementById('productName').value.trim()

if(!name){
alert("Product name required")
return
}

const price=parseFloat(document.getElementById('productPrice').value)||0

const id=editingId || 'product-'+Date.now()

const productData={
name:name,
price:'R '+price.toFixed(2),
priceN:price,
category:document.getElementById('productCategory').value
}

await window.firebaseSaveProduct(id,productData)

loadList()

}



async function deleteProduct(){

if(!editingId) return

await window.firebaseDeleteProduct(editingId)

loadList()

}

</script>

</body>
</html>
