<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Janedore · Product Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/phosphor-icons"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyBjtD9j-jKHtjMVmI2ENxy0T3ts9uf2JNI",
    authDomain: "janedore-9f035.firebaseapp.com",
    projectId: "janedore-9f035",
    storageBucket: "janedore-9f035.firebasestorage.app",
    messagingSenderId: "571299748651",
    appId: "1:571299748651:web:01463a772d47b39cc4036e",
    measurementId: "G-Y9NMT0ZGKZ"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.collection = collection;
  window.getDocs = getDocs;
  window.doc = doc;
  window.setDoc = setDoc;
  window.deleteDoc = deleteDoc;
  window.serverTimestamp = serverTimestamp;

  // Load all products
  window.loadProducts = async function() {
    try {
      const snap = await getDocs(collection(db, "products"));
      const products = [];
      snap.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
      return products;
    } catch (e) {
      console.error("Load error:", e);
      return [];
    }
  };

  // Save product
  window.saveProduct = async function(productId, productData) {
    try {
      await setDoc(doc(db, "products", productId), {
        ...productData,
        updatedAt: serverTimestamp()
      });
      return { ok: true };
    } catch (e) {
      return { ok: false, error: e.message };
    }
  };

  // Delete product
  window.deleteProduct = async function(productId) {
    try {
      await deleteDoc(doc(db, "products", productId));
      return { ok: true };
    } catch (e) {
      return { ok: false, error: e.message };
    }
  };
</script>

<style>
@font-face{font-family:'Driftune';src:url('https://raw.githubusercontent.com/Pmalapile07/Janedore/main/DriftuneDemo-SemiBold.otf') format('opentype');}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Manrope',sans-serif;
  background:#f5f5f5;
  padding:20px;
}
.container{
  max-width:1400px;
  margin:0 auto;
}
h1{
  font-family:'Driftune',sans-serif;
  font-size:32px;
  letter-spacing:3px;
  color:#111;
  margin-bottom:30px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
h1 span{
  font-family:'Manrope',sans-serif;
  font-size:14px;
  color:#666;
  font-weight:400;
}
.btn{
  font-family:'Driftune',sans-serif;
  font-size:11px;
  letter-spacing:2px;
  padding:12px 24px;
  border:none;
  cursor:pointer;
  transition:all .2s;
  border-radius:4px;
}
.btn-primary{
  background:#111;
  color:#fff;
}
.btn-primary:hover{
  background:#333;
}
.btn-secondary{
  background:#fff;
  color:#111;
  border:1px solid #ddd;
}
.btn-secondary:hover{
  background:#f5f5f5;
}
.btn-danger{
  background:#c0392b;
  color:#fff;
}
.btn-danger:hover{
  background:#e74c3c;
}
.btn-sm{
  padding:6px 12px;
  font-size:10px;
}

/* Products Grid */
.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:20px;
  margin-bottom:40px;
}
.product-card{
  background:#fff;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:transform .2s, box-shadow .2s;
}
.product-card:hover{
  transform:translateY(-4px);
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
}
.product-img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
  background:#e8e8e8;
}
.product-info{
  padding:16px;
}
.product-name{
  font-family:'Driftune',sans-serif;
  font-size:13px;
  letter-spacing:1.5px;
  color:#111;
  margin-bottom:4px;
}
.product-price{
  font-family:'Manrope',sans-serif;
  font-size:13px;
  font-weight:600;
  color:#111;
}
.product-badges{
  display:flex;
  gap:6px;
  margin-top:8px;
  flex-wrap:wrap;
}
.badge{

  padding:2px 8px;
  border-radius:20px;

}
.badge.featured{

}
.badge.new{

}

/* Modal */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);

  display:none;
  align-items:center;
  justify-content:center;
}
.modal-overlay.open{
  display:flex;
}
.modal{
  background:#fff;
  border-radius:12px;
  width:90%;
  max-width:700px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:24px 28px;
  border-bottom:1px solid #f0f0f0;
}
.modal-header h2{
  font-family:'Driftune',sans-serif;
  font-size:18px;
  letter-spacing:2px;
  color:#111;
}
.modal-close{
  width:32px;
  height:32px;
  border:none;
  background:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  transition:background .2s;
}
.modal-close:hover{
  background:#f0f0f0;
}
.modal-close i{
  font-size:20px;
  color:#111;
}
.modal-body{
  padding:28px;
}

/* Form */
.form-group{
  margin-bottom:24px;
}
.form-label{
  font-family:'Driftune',sans-serif;
  font-size:10px;
  letter-spacing:2px;
  color:#999;
  display:block;
  margin-bottom:8px;
}
.form-input{
  width:100%;
  font-family:'Manrope',sans-serif;
  font-size:14px;
  border:1px solid #ddd;
  padding:12px 14px;
  border-radius:6px;
  outline:none;
  transition:border-color .2s;
}
.form-input:focus{
  border-color:#111;
}
.form-textarea{
  min-height:100px;
  resize:vertical;
}
.form-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.checkbox-group{
  display:flex;
  gap:20px;
  margin-top:8px;
}
.checkbox-item{
  display:flex;
  align-items:center;
  gap:8px;
}
.checkbox-item input{
  width:18px;
  height:18px;
  cursor:pointer;
}
.checkbox-item label{
  font-family:'Manrope',sans-serif;
  font-size:13px;
  color:#555;
  cursor:pointer;
}

/* Variants */
.variants-section{
  margin-top:16px;
  padding-top:16px;
  border-top:1px solid #f0f0f0;
}
.variant-item{
  display:grid;
  grid-template-columns:1fr 1fr 2fr 40px;
  gap:8px;
  margin-bottom:12px;
  align-items:center;
}
.variant-input{
  font-family:'Manrope',sans-serif;
  font-size:13px;
  border:1px solid #ddd;
  padding:10px 12px;
  border-radius:6px;
  outline:none;
}
.variant-input:focus{
  border-color:#111;
}
.variant-remove{
  width:36px;
  height:36px;
  border:none;
  background:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#c0392b;
  border-radius:6px;
}
.variant-remove:hover{
  background:#fef0f0;
}
.add-variant-btn{
  font-family:'Driftune',sans-serif;
  font-size:10px;
  letter-spacing:1.5px;
  background:none;
  border:1px dashed #ccc;
  padding:10px 16px;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  margin-top:8px;
  transition:all .2s;
}
.add-variant-btn:hover{
  border-color:#111;
  background:#fafafa;
}

/* Sizes */
.sizes-input{
  margin-top:8px;
}
.size-tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:12px;
}
.size-tag{
  font-family:'Driftune',sans-serif;
  font-size:11px;
  padding:6px 14px;
  background:#f0f0f0;
  border-radius:20px;
  cursor:pointer;
  transition:all .2s;
}
.size-tag.selected{
  background:#111;
  color:#fff;
}

/* Image URL list */
.image-url-item{
  display:flex;
  gap:8px;
  margin-bottom:10px;
  align-items:center;
}
.image-url-item input{
  flex:1;
}
.image-url-remove{
  width:36px;
  height:36px;
  border:none;
  background:none;
  cursor:pointer;
  color:#c0392b;
}

.modal-footer{
  display:flex;
  gap:12px;
  justify-content:flex-end;
  margin-top:32px;
  padding-top:24px;
  border-top:1px solid #f0f0f0;
}

/* Status messages */
.status-msg{
  padding:12px 16px;
  border-radius:6px;
  margin-bottom:20px;
  display:none;
  font-family:'Manrope',sans-serif;
  font-size:13px;
}
.status-msg.success{
  background:#d5f5e3;
  color:#27ae60;
  display:block;
}
.status-msg.error{
  background:#fdeded;
  color:#c0392b;
  display:block;
}

/* Empty state */
.empty-state{
  text-align:center;
  padding:60px 20px;
  background:#fff;
  border-radius:12px;
}
.empty-state i{
  font-size:48px;
  color:#ccc;
  margin-bottom:16px;
}
.empty-state p{
  font-family:'Manrope',sans-serif;
  font-size:14px;
  color:#999;
  margin-bottom:24px;
}

.stats-bar{
  display:flex;
  gap:20px;
  margin-bottom:30px;
}
.stat-card{
  background:#fff;
  padding:20px 24px;
  border-radius:12px;
  flex:1;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.stat-label{
  font-family:'Driftune',sans-serif;
  font-size:10px;
  letter-spacing:2px;
  color:#999;
  margin-bottom:8px;
}
.stat-value{
  font-family:'Manrope',sans-serif;
  font-size:28px;
  font-weight:600;
  color:#111;
}
</style>
</head>
<body>

<div class="container">
  <h1>
    JANEDORE · PRODUCT MANAGER
    <span>Mini Shopify Admin</span>
  </h1>

  <div id="statusMsg" class="status-msg"></div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">TOTAL PRODUCTS</div>
      <div class="stat-value" id="totalProducts">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">FEATURED</div>
      <div class="stat-value" id="featuredCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">NEW ARRIVALS</div>
      <div class="stat-value" id="newCount">0</div>
    </div>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2 style="font-family:'Driftune',sans-serif; font-size:16px; letter-spacing:2px; color:#111;">ALL PRODUCTS</h2>
    <button class="btn btn-primary" onclick="openProductModal()">
      <i class="ph ph-plus" style="margin-right:8px;"></i>ADD NEW PRODUCT
    </button>
  </div>

  <div id="productsContainer">
    <div class="empty-state">
      <i class="ph ph-package"></i>
      <p>Loading products...</p>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">ADD NEW PRODUCT</h2>
      <button class="modal-close" onclick="closeProductModal()">
        <i class="ph ph-x"></i>
      </button>
    </div>
    <div class="modal-body">
      <form id="productForm" onsubmit="return false;">
        <input type="hidden" id="productId">
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">PRODUCT NAME</label>
            <input class="form-input" id="productName" placeholder="e.g. RUGAL POKER DOT TOP">
          </div>
          <div class="form-group">
            <label class="form-label">PRICE (R)</label>
            <input class="form-input" id="productPrice" placeholder="e.g. 450.00">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">DESCRIPTION</label>
          <textarea class="form-input form-textarea" id="productDesc" placeholder="Describe your product..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">CATEGORY</label>
          <input class="form-input" id="productCategory" placeholder="e.g. clothing, bags, sunglasses" value="clothing">
        </div>

        <div class="form-group">
          <label class="form-label">MAIN IMAGE URL</label>
          <input class="form-input" id="productMainImg" placeholder="https://...">
        </div>

        <div class="form-group">
          <label class="form-label">ADDITIONAL IMAGES (one per line)</label>
          <textarea class="form-input form-textarea" id="productImages" placeholder="https://...&#10;https://..." style="min-height:80px;"></textarea>
        </div>

        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="productFeatured">
            <label>Featured Product</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="productNew">
            <label>New Arrival</label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">SIZES</label>
          <div class="size-tags" id="sizeTags">
            <span class="size-tag selected" data-size="XS">XS</span>
            <span class="size-tag selected" data-size="S">S</span>
            <span class="size-tag selected" data-size="M">M</span>
            <span class="size-tag selected" data-size="L">L</span>
            <span class="size-tag selected" data-size="XL">XL</span>
          </div>
        </div>

        <div class="variants-section">
          <label class="form-label">VARIANTS (Colours)</label>
          <div id="variantsList"></div>
          <button type="button" class="add-variant-btn" onclick="addVariant()">
            <i class="ph ph-plus"></i> ADD VARIANT
          </button>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeProductModal()">CANCEL</button>
          <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="deleteCurrentProduct()">DELETE</button>
          <button type="submit" class="btn btn-primary" onclick="saveProduct()">SAVE PRODUCT</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
var currentProducts = [];
var editingId = null;

// Load and display products
async function loadAndDisplayProducts() {
  const container = document.getElementById('productsContainer');
  container.innerHTML = '<div class="empty-state"><i class="ph ph-package"></i><p>Loading products...</p></div>';
  
  const products = await window.loadProducts();
  currentProducts = products;
  
  // Update stats
  document.getElementById('totalProducts').textContent = products.length;
  document.getElementById('featuredCount').textContent = products.filter(p => p.isFeatured).length;
  document.getElementById('newCount').textContent = products.filter(p => p.isNewArrival).length;
  
  if (products.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="ph ph-package"></i><p>No products yet. Add your first product!</p><button class="btn btn-primary" onclick="openProductModal()">ADD PRODUCT</button></div>';
    return;
  }
  
  container.innerHTML = '<div class="products-grid">' + products.map(p => `
    <div class="product-card" onclick="editProduct('${p.id}')">
      ${p.imgSrc ? `<img class="product-img" src="${p.imgSrc}" alt="${p.name}">` : '<div class="product-img" style="display:flex;align-items:center;justify-content:center;color:#ccc;"><i class="ph ph-image" style="font-size:32px;"></i></div>'}
      <div class="product-info">
        <p class="product-name">${p.name || 'Untitled'}</p>
        <p class="product-price">${p.price || 'R 0.00'}</p>
        <div class="product-badges">
          ${p.isFeatured ? '<span class="badge featured">FEATURED</span>' : ''}
          ${p.isNewArrival ? '<span class="badge new">NEW</span>' : ''}
          <span class="badge">${p.sizes?.length || 5} sizes</span>
          <span class="badge">${p.variants?.length || 0} variants</span>
        </div>
      </div>
    </div>
  `).join('') + '</div>';
}

// Open modal for new product
function openProductModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'ADD NEW PRODUCT';
  document.getElementById('productId').value = '';
  document.getElementById('productName').value = '';
  document.getElementById('productPrice').value = '';
  document.getElementById('productDesc').value = '';
  document.getElementById('productCategory').value = 'clothing';
  document.getElementById('productMainImg').value = '';
  document.getElementById('productImages').value = '';
  document.getElementById('productFeatured').checked = false;
  document.getElementById('productNew').checked = false;
  document.getElementById('deleteBtn').style.display = 'none';
  
  // Reset sizes
  document.querySelectorAll('.size-tag').forEach(tag => tag.classList.add('selected'));
  
  // Reset variants
  document.getElementById('variantsList').innerHTML = '';
  addVariant(); // Add one empty variant
  
  document.getElementById('productModal').classList.add('open');
}

// Edit existing product
function editProduct(id) {
  const product = currentProducts.find(p => p.id === id);
  if (!product) return;
  
  editingId = id;
  document.getElementById('modalTitle').textContent = 'EDIT PRODUCT';
  document.getElementById('productId').value = id;
  document.getElementById('productName').value = product.name || '';
  document.getElementById('productPrice').value = product.priceN || '';
  document.getElementById('productDesc').value = product.description || product.desc || '';
  document.getElementById('productCategory').value = product.category || 'clothing';
  document.getElementById('productMainImg').value = product.imgSrc || '';
  document.getElementById('productImages').value = (product.images || []).join('\n');
  document.getElementById('productFeatured').checked = product.isFeatured || false;
  document.getElementById('productNew').checked = product.isNewArrival || false;
  document.getElementById('deleteBtn').style.display = 'block';
  
  // Set sizes
  const sizes = product.sizes || ['XS','S','M','L','XL'];
  document.querySelectorAll('.size-tag').forEach(tag => {
    tag.classList.toggle('selected', sizes.includes(tag.dataset.size));
  });
  
  // Set variants
  const variantsList = document.getElementById('variantsList');
  variantsList.innerHTML = '';
  if (product.variants && product.variants.length > 0) {
    product.variants.forEach(v => addVariant(v.label, v.bg, v.imgSrc));
  } else {
    addVariant();
  }
  
  document.getElementById('productModal').classList.add('open');
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('open');
  hideStatus();
}

function showStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg ' + type;
}

function hideStatus() {
  document.getElementById('statusMsg').className = 'status-msg';
}

// Size tag click
document.querySelectorAll('.size-tag').forEach(tag => {
  tag.addEventListener('click', function() {
    this.classList.toggle('selected');
  });
});

// Variant management
function addVariant(label = '', bg = '#cccccc', imgSrc = '') {
  const variantsList = document.getElementById('variantsList');
  const index = variantsList.children.length;
  
  const div = document.createElement('div');
  div.className = 'variant-item';
  div.innerHTML = `
    <input type="text" class="variant-input" placeholder="Label (e.g. White)" value="${label}">
    <input type="text" class="variant-input" placeholder="Color (#cccccc)" value="${bg}">
    <input type="text" class="variant-input" placeholder="Image URL (optional)" value="${imgSrc}">
    <button type="button" class="variant-remove" onclick="this.parentElement.remove()">
      <i class="ph ph-trash"></i>
    </button>
  `;
  variantsList.appendChild(div);
}

// Save product
async function saveProduct() {
  const name = document.getElementById('productName').value.trim();
  const priceInput = document.getElementById('productPrice').value.trim();
  
  if (!name) {
    alert('Product name is required');
    return;
  }
  
  const priceN = parseFloat(priceInput) || 0;
  const price = 'R ' + priceN.toFixed(2);
  
  // Generate ID from name
  let id = editingId;
  if (!id) {
    id = name.toLowerCase()
      .replace(/[^a-z0-9]/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
    if (!id) id = 'product-' + Date.now();
  }
  
  // Get selected sizes
  const sizes = [];
  document.querySelectorAll('.size-tag.selected').forEach(tag => {
    sizes.push(tag.dataset.size);
  });
  
  // Get variants
  const variants = [];
  document.querySelectorAll('.variant-item').forEach(item => {
    const inputs = item.querySelectorAll('.variant-input');
    const label = inputs[0].value.trim();
    const bg = inputs[1].value.trim() || '#cccccc';
    const imgSrc = inputs[2].value.trim();
    if (label) {
      variants.push({ label, bg, imgSrc });
    }
  });
  
  // Get additional images
  const imagesText = document.getElementById('productImages').value.trim();
  const images = imagesText ? imagesText.split('\n').map(s => s.trim()).filter(s => s) : [];
  
  const productData = {
    id: id,
    name: name,
    price: price,
    priceN: priceN,
    description: document.getElementById('productDesc').value.trim(),
    category: document.getElementById('productCategory').value.trim() || 'clothing',
    imgSrc: document.getElementById('productMainImg').value.trim(),
    images: images.length > 0 ? images : (document.getElementById('productMainImg').value.trim() ? [document.getElementById('productMainImg').value.trim()] : []),
    sizes: sizes.length > 0 ? sizes : ['XS','S','M','L','XL'],
    variants: variants,
    isFeatured: document.getElementById('productFeatured').checked,
    isNewArrival: document.getElementById('productNew').checked,
    createdAt: Date.now()
  };
  
  const result = await window.saveProduct(id, productData);
  
  if (result.ok) {
    showStatus(editingId ? 'Product updated successfully!' : 'Product created successfully!', 'success');
    closeProductModal();
    loadAndDisplayProducts();
  } else {
    showStatus('Error: ' + (result.error || 'Failed to save product'), 'error');
  }
}

// Delete product
async function deleteCurrentProduct() {
  const id = document.getElementById('productId').value;
  if (!id) return;
  
  if (!confirm('Are you sure you want to delete this product?')) return;
  
  const result = await window.deleteProduct(id);
  
  if (result.ok) {
    showStatus('Product deleted successfully!', 'success');
    closeProductModal();
    loadAndDisplayProducts();
  } else {
    showStatus('Error: ' + (result.error || 'Failed to delete product'), 'error');
  }
}

// Initialize
loadAndDisplayProducts();
</script>
</body>
</html>
