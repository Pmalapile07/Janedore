<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Phosphor Icons -->
<script src="https://unpkg.com/phosphor-icons"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
background:white;
height:70px;
padding:0 20px;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:1000;
}

/* LEFT */

.header-left{
display:flex;
align-items:center;
}

/* CENTER LOGO */

.header-center{
position:absolute;
left:50%;
transform:translateX(-50%);
}

.header-center img{
height:36px;
}

/* RIGHT */

.header-right{
display:flex;
align-items:center;
gap:18px;
}

/* ICON STYLE */

.header i{
font-size:26px;
cursor:pointer;
color:#111;
transition:opacity 0.2s ease;
}

.header i:hover{
opacity:0.6;
}

</style>
</head>

<body>

<header class="header">

<!-- MENU -->
<div class="header-left">
<i class="ph-light ph-list"></i>
</div>

<!-- LOGO -->
<div class="header-center">
<img src="logo.png" alt="Logo">
</div>

<!-- FAVORITES + CART -->
<div class="header-right">
<i class="ph-light ph-heart-straight"></i>
<i class="ph-light ph-handbag-simple"></i>
</div>

</header>

</body>
</html>
