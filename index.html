<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Phosphor Icons -->
<script src="https://unpkg.com/phosphor-icons"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:white;
  height:70px;
  padding:0 20px;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:1000;
}

/* LEFT: MENU + LOGO */
.header-left{
  display:flex;
  align-items:center;
  gap:12px; /* Space between menu icon and logo */
}

.header-left img{
  height:36px; /* Adjust logo height */
  max-width:180px;
  object-fit:contain;
}

/* RIGHT: SEARCH + FAVORITES + CART */
.header-right{
  display:flex;
  align-items:center;
  gap:18px;
}

/* ICON STYLE */
.header i{
  font-size:26px;
  cursor:pointer;
  color:#111;
  transition:opacity 0.2s ease;
}

.header i:hover{
  opacity:0.6;
}
</style>
</head>

<body>

<header class="header">

  <!-- LEFT: MENU + LOGO -->
  <div class="header-left">
    <i class="ph-light ph-list"></i>
    <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/Cream%20Black%20Typography%20Loop%20Brand%20Logo%20(500%20x%20180%20px).png" alt="Logo">
  </div>

  <!-- RIGHT: SEARCH + FAVORITES + CART -->
  <div class="header-right">
    <i class="ph-light ph-magnifying-glass"></i>
    <i class="ph-light ph-heart-straight"></i>
    <i class="ph-light ph-handbag-simple"></i>
  </div>

</header>

</body>
</html>
