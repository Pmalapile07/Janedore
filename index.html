<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Phosphor Icons -->
<script src="https://unpkg.com/phosphor-icons"></script>

<style>

/* FONT */
@font-face {
  font-family: 'Driftune';
  src: url('https://raw.githubusercontent.com/Pmalapile07/Janedore/main/DriftuneDemo-SemiBold.otf') format('opentype');
}

/* BODY */
body{
  margin:0;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:white;
  height:70px;
  padding:0 20px;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:1000;
}

/* LEFT */
.header-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.header-left img{
  height:44px; /* increased logo size */
  object-fit:contain;
}

/* RIGHT */
.header-right{
  display:flex;
  align-items:center;
  gap:18px;
}

/* ICON STYLE */
.header i{
  font-size:26px;
  cursor:pointer;
  color:#111;
  transition:opacity 0.2s ease;
}

.header i:hover{
  opacity:0.6;
}

/* BELT WRAPPER (keeps alignment with header padding) */
.belt-wrapper{
  padding:0 20px;
  background:black;
  position: sticky;
  top: 70px; /* same height as the header */
  z-index: 999;
}

/* BELT */
.belt{
  display:flex;
  justify-content:center;
  gap:32px;
  color:white;
  font-family:'Driftune', sans-serif;
  font-size:12px; /* reduced text size */
  letter-spacing:1px; /* spacing between letters */
  padding:7px 0; /* thinner belt */
}

.belt span{
  cursor:pointer;
  transition:opacity 0.2s ease;
}

.belt span:hover{
  opacity:0.7;
}

/* IMAGE UNDER BELT */
.banner img{
  width:100%;
  height:auto;
  display:block;
}

</style>
</head>

<body>

<header class="header">

  <!-- LEFT -->
  <div class="header-left">
    <i class="ph-light ph-list"></i>
    <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/Cream%20Black%20Typography%20Loop%20Brand%20Logo%20(500%20x%20180%20px).png" alt="Logo">
  </div>

  <!-- RIGHT -->
  <div class="header-right">
    <i class="ph-light ph-magnifying-glass"></i>
    <i class="ph-light ph-heart-straight"></i>
    <i class="ph-light ph-handbag-simple"></i>
  </div>

</header>

<!-- BELT -->
<div class="belt-wrapper">
  <div class="belt">
    <span>NEW TODAY</span>
    <span>CLOTHING</span>
    <span>SUNGLASSES</span>
    <span>BAGS</span>
    <span>MORE</span>
  </div>
</div>

<!-- IMAGE -->
<div class="banner">
  <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/IMG_5631.jpeg" alt="Banner">
</div>

</body>
</html>
