<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Phosphor Icons -->

<script src="https://unpkg.com/phosphor-icons"></script>

<style>

/* FONT */
@font-face {
  font-family: 'Driftune';
  src: url('https://raw.githubusercontent.com/Pmalapile07/Janedore/main/DriftuneDemo-SemiBold.otf') format('opentype');
}

/* BODY */
body{
  margin:0;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:white;
  height:70px;
  padding:0 20px;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:1000;
}

/* LEFT */
.header-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.header-left img{
  height:44px;
  object-fit:contain;
}

/* RIGHT */
.header-right{
  display:flex;
  align-items:center;
  gap:18px;
}

/* ICON STYLE */
.header i{
  font-size:26px;
  cursor:pointer;
  color:#111;
  transition:opacity 0.2s ease;
}

.header i:hover{
  opacity:0.6;
}

/* CART WRAPPER — positions the badge relative to the icon */
.cart-wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

/* CART BADGE */
.cart-badge{
  position:absolute;
  top:-6px;
  right:-7px;
  background:black;
  color:white;
  font-family:Arial, sans-serif;
  font-size:9px;
  font-weight:700;
  min-width:16px;
  height:16px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 3px;
  pointer-events:none;
  line-height:1;
  border:1.5px solid white;
}

/* BELT WRAPPER — sticky, sits just below header */
.belt-wrapper{
  padding:0 20px;
  background:black;
  position:sticky;
  top:70px; /* same as header height */
  z-index:999;
}

/* BELT */
.belt{
  display:flex;
  justify-content:center;
  gap:32px;
  color:white;
  font-family:'Driftune', sans-serif;
  font-size:12px;
  letter-spacing:1px;
  padding:7px 0;
}

.belt span{
  cursor:pointer;
  transition:opacity 0.2s ease;
}

.belt span:hover{
  opacity:0.7;
}

/* IMAGE UNDER BELT */
.banner img{
  width:100%;
  height:auto;
  display:block;
}

</style>

</head>

<body>

<header class="header">

  <!-- LEFT -->

  <div class="header-left">
    <i class="ph-light ph-list"></i>
    <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/Cream%20Black%20Typography%20Loop%20Brand%20Logo%20(500%20x%20180%20px).png" alt="Logo">
  </div>

  <!-- RIGHT -->

  <div class="header-right">
    <i class="ph-light ph-magnifying-glass"></i>
    <i class="ph-light ph-heart-straight"></i>
    <!-- CART with badge -->
    <div class="cart-wrapper">
      <i class="ph-light ph-handbag-simple" id="cart-icon"></i>
      <span class="cart-badge" id="cart-count">0</span>
    </div>
  </div>

</header>

<!-- BELT — now sticky -->

<div class="belt-wrapper">
  <div class="belt">
    <span>NEW TODAY</span>
    <span>CLOTHING</span>
    <span>BAGS</span>
    <span>SUNGLASSES</span>
  </div>
</div>

<!-- IMAGE -->

<div class="banner">
  <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/IMG_5631.jpeg" alt="Banner">
</div>

<script>
  // Cart counter logic
  // You can call addToCart() from anywhere to increment
  let cartCount = 0;

  function updateCartBadge() {
    const badge = document.getElementById('cart-count');
    badge.textContent = cartCount;
    // Hide badge when 0, show when >0
    badge.style.display = cartCount === 0 ? 'none' : 'flex';
  }

  function addToCart(qty = 1) {
    cartCount += qty;
    updateCartBadge();
  }

  // Initialise — badge hidden at 0
  updateCartBadge();

  // Demo: clicking the cart icon adds 1 (remove or replace with real logic)
  document.getElementById('cart-icon').addEventListener('click', () => {
    addToCart(1);
  });
</script>

</body>
</html>
