<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JANEDORE — Coming Soon</title>

  <!-- Google Font: Manrope -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400&display=swap" rel="stylesheet">

  <style>
    /* Import custom font from GitHub */
    @font-face {
      font-family: 'Driftune';
      src: url('https://raw.githubusercontent.com/Pmalapile07/Janedore/main/DriftuneDemo-SemiBold.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      font-family: 'Manrope', sans-serif;
    }

    .center-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
    }

    .brand {
      font-family: 'Driftune', serif;
      font-size: 48px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .coming-soon {
      font-size: 14px;
      letter-spacing: 3px;
      opacity: 0.8;
    }

    .footer {
      font-size: 12px;
      margin-bottom: 20px;
      opacity: 0.6;
    }

    /* Responsive tweaks */
    @media (max-width: 600px) {
      .brand {
        font-size: 32px;
      }

      .coming-soon {
        font-size: 12px;
      }

      .footer {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>

  <div class="center-content">
    <div class="brand">JANEDORE</div>
    <div class="coming-soon">COMING SOON</div>
  </div>

  <div class="footer">
    Find out when we launch
  </div>

</body>
</html>
