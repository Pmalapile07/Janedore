<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/phosphor-icons"></script>

<style>
@font-face {
  font-family: 'Driftune';
  src: url('https://raw.githubusercontent.com/Pmalapile07/Janedore/main/DriftuneDemo-SemiBold.otf') format('opentype');
}

html, body {
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
}

/* ANNOUNCEMENT BAR */
.announcement{
  background:black;
  color:white;
  font-family:'Driftune', sans-serif;
  font-size:11px;
  letter-spacing:2px;
  text-align:center;
  padding:8px 20px;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1001;
}

/* HEADER — sits below announcement bar (~33px) */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:white;
  height:70px;
  padding:0 20px;
  border-bottom:1px solid #eee;
  position:fixed;
  top:33px;
  left:0;
  right:0;
  z-index:1000;
}

.header-left{
  display:flex;
  align-items:center;
}

.header-left img{
  height:44px;
  object-fit:contain;
}

.header-right{
  display:flex;
  align-items:center;
  gap:18px;
}

.header i{
  font-size:26px;
  cursor:pointer;
  color:#111;
  transition:opacity 0.2s ease;
}

.header i:hover{ opacity:0.6; }

/* CART */
.cart-wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.cart-badge{
  position:absolute;
  top:-6px;
  right:-8px;
  background:transparent;
  color:black;
  font-family:Arial, sans-serif;
  font-size:10px;
  font-weight:700;
  min-width:16px;
  height:16px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 3px;
  pointer-events:none;
  line-height:1;
  border:none;
}

/* PAGE CONTENT — below announcement (33px) + header (70px) */
.page-content{
  padding-top:100px;
}

/* MAIN BANNER */
.banner{
  position:relative;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

.banner-label{
  position:absolute;
  bottom:32px;
  left:28px;
  color:white;
  font-family:'Driftune', sans-serif;
  font-size:18px;
  letter-spacing:2px;
  line-height:1.15;
  pointer-events:none;
  text-shadow:0 2px 14px rgba(0,0,0,0.4);
}

/* DUO GRID */
.duo-grid{
  display:flex;
  gap:2px;
  background:#fff;
  margin-top:2px;
}

.duo-card{
  flex:1;
  position:relative;
  overflow:hidden;
}

/* image / placeholder area */
.duo-card .img-wrap{
  position:relative;
  width:100%;
  aspect-ratio:3/4;
  overflow:hidden;
  background:#e8e8e8;
}

.duo-card .img-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* placeholder icon */
.duo-card .img-wrap .ph-placeholder{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.duo-card .img-wrap .ph-placeholder i{
  font-size:40px;
  color:#c0c0c0;
}

/* label ON the image — bottom center */
.duo-label{
  position:absolute;
  bottom:16px;
  left:0;
  right:0;
  text-align:center;
  color:white;
  font-family:'Driftune', sans-serif;
  font-size:14px;
  letter-spacing:2px;
  line-height:1.2;
  pointer-events:none;
  text-shadow:0 2px 10px rgba(0,0,0,0.45);
}
</style>

</head>

<body>

<!-- ANNOUNCEMENT BAR -->

<div class="announcement">FREE SHIPPING WITH ORDERS OVER R750</div>

<header class="header">
  <div class="header-left">
    <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/Cream%20Black%20Typography%20Loop%20Brand%20Logo%20(500%20x%20180%20px).png" alt="Logo">
  </div>
  <div class="header-right">
    <i class="ph-light ph-magnifying-glass"></i>
    <i class="ph-light ph-heart-straight"></i>
    <div class="cart-wrapper">
      <i class="ph-light ph-handbag-simple" id="cart-icon"></i>
      <span class="cart-badge" id="cart-count">0</span>
    </div>
    <i class="ph-light ph-list"></i>
  </div>
</header>

<div class="page-content">

  <!-- MAIN BANNER -->

  <div class="banner">
    <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/IMG_5631.jpeg" alt="Banner">
    <div class="banner-label">NEW IN<br>CLOTHING</div>
  </div>

  <!-- ROW 1: BAGS + SUNGLASSES -->

  <div class="duo-grid">
    <div class="duo-card">
      <div class="img-wrap">
        <img src="" alt="Bags" onerror="this.style.display='none'">
        <div class="ph-placeholder"><i class="ph-light ph-image"></i></div>
      </div>
      <div class="duo-label">BAGS</div>
    </div>
    <div class="duo-card">
      <div class="img-wrap">
        <img src="" alt="Sunglasses" onerror="this.style.display='none'">
        <div class="ph-placeholder"><i class="ph-light ph-image"></i></div>
      </div>
      <div class="duo-label">SUNGLASSES</div>
    </div>
  </div>

  <!-- ROW 2: TOPS + SETS -->

  <div class="duo-grid">
    <div class="duo-card">
      <div class="img-wrap">
        <img src="" alt="Tops" onerror="this.style.display='none'">
        <div class="ph-placeholder"><i class="ph-light ph-image"></i></div>
      </div>
      <div class="duo-label">TOPS</div>
    </div>
    <div class="duo-card">
      <div class="img-wrap">
        <img src="" alt="Sets" onerror="this.style.display='none'">
        <div class="ph-placeholder"><i class="ph-light ph-image"></i></div>
      </div>
      <div class="duo-label">SETS</div>
    </div>
  </div>

</div>

<script>
  let cartCount = 0;

  function updateCartBadge() {
    const badge = document.getElementById('cart-count');
    badge.textContent = cartCount;
    badge.style.display = 'flex';
  }

  function addToCart(qty = 1) {
    cartCount += qty;
    updateCartBadge();
  }

  updateCartBadge();

  document.getElementById('cart-icon').addEventListener('click', () => {
    addToCart(1);
  });
</script>

</body>
</html>
