<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/phosphor-icons"></script>

<style>
@font-face {
  font-family: 'Driftune';
  src: url('https://raw.githubusercontent.com/Pmalapile07/Janedore/main/DriftuneDemo-SemiBold.otf') format('opentype');
}

html, body {
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:white;
  height:70px;
  padding:0 20px;
  border-bottom:1px solid #eee;
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;
}

/* LEFT */
.header-left{
  display:flex;
  align-items:center;
}

.header-left img{
  height:44px;
  object-fit:contain;
}

/* RIGHT */
.header-right{
  display:flex;
  align-items:center;
  gap:18px;
}

.header i{
  font-size:26px;
  cursor:pointer;
  color:#111;
  transition:opacity 0.2s ease;
}

.header i:hover{
  opacity:0.6;
}

/* CART */
.cart-wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.cart-badge{
  position:absolute;
  top:-6px;
  right:-8px;       /* shifted 1px more to the right */
  background:transparent;
  color:black;
  font-family:Arial, sans-serif;
  font-size:10px;   /* increased by 1px */
  font-weight:700;
  min-width:16px;
  height:16px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 3px;
  pointer-events:none;
  line-height:1;
  border:none;      /* border removed */
}

/* BELT */
.belt-wrapper{
  padding:0 20px;
  background:black;
  position:fixed;
  top:70px;
  left:0;
  right:0;
  z-index:999;
}

.belt{
  display:flex;
  justify-content:center;
  gap:32px;
  color:white;
  font-family:'Driftune', sans-serif;
  font-size:12px;
  letter-spacing:1px;
  padding:7px 0;
}

.belt span{
  cursor:pointer;
  transition:opacity 0.2s ease;
}

.belt span:hover{
  opacity:0.7;
}

/* PAGE CONTENT — sits below fixed header (70px) + fixed belt (26px) */
.page-content{
  padding-top:108px;
}

/* BANNER */
.banner{
  position:relative;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

/* OVERLAY TEXT */
.banner-label{
  position:absolute;
  bottom:32px;
  left:28px;
  color:white;
  font-family:'Driftune', sans-serif;
  font-size:18px;
  letter-spacing:2px;
  line-height:1.15;
  pointer-events:none;
  text-shadow:0 2px 14px rgba(0,0,0,0.4);
}
</style>

</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/Cream%20Black%20Typography%20Loop%20Brand%20Logo%20(500%20x%20180%20px).png" alt="Logo">
  </div>
  <div class="header-right">
    <i class="ph-light ph-magnifying-glass"></i>
    <i class="ph-light ph-heart-straight"></i>
    <div class="cart-wrapper">
      <i class="ph-light ph-handbag-simple" id="cart-icon"></i>
      <span class="cart-badge" id="cart-count">0</span>
    </div>
    <i class="ph-light ph-list"></i>
  </div>
</header>

<div class="belt-wrapper">
  <div class="belt">
    <span>NEW TODAY</span>
    <span>CLOTHING</span>
    <span>BAGS</span>
    <span>SUNGLASSES</span>
  </div>
</div>

<div class="page-content">
  <div class="banner">
    <img src="https://raw.githubusercontent.com/Pmalapile07/Janedore/main/IMG_5631.jpeg" alt="Banner">
    <div class="banner-label">NEW IN<br>CLOTHING</div>
  </div>
</div>

<script>
  let cartCount = 0;

  function updateCartBadge() {
    const badge = document.getElementById('cart-count');
    badge.textContent = cartCount;
    badge.style.display = 'flex';
  }

  function addToCart(qty = 1) {
    cartCount += qty;
    updateCartBadge();
  }

  updateCartBadge();

  document.getElementById('cart-icon').addEventListener('click', () => {
    addToCart(1);
  });
</script>

</body>
</html>
